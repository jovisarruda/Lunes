<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lunes</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --bg:#f6f7fb;--panel:#fff;--border:#e4e6ef;--text:#20222c;--muted:#8a8fa3;
  --accent:#4f6ef7;--accent-soft:#eef1fe;--danger:#e2445c;--ok:#00c875;
  --r:8px;font-size:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font:inherit;color:inherit;border:1px solid var(--border);border-radius:6px;padding:6px 8px;background:#fff;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
.btn{padding:7px 14px;border-radius:6px;background:var(--accent);color:#fff;font-weight:600}
.btn:hover{filter:brightness(1.08)}
.btn.ghost{background:none;color:var(--muted);border:1px solid var(--border)}
.btn.ghost:hover{color:var(--text);background:var(--accent-soft)}
.btn.sm{padding:4px 9px;font-size:12.5px}
.icon-btn{padding:6px;border-radius:6px;color:var(--muted);line-height:1}
.icon-btn:hover{background:var(--accent-soft);color:var(--accent)}

/* login */
#login{height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px}
#login .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:36px;width:340px;display:flex;flex-direction:column;gap:12px;box-shadow:0 8px 30px rgba(30,40,90,.06)}
.logo{font-size:26px;font-weight:700;letter-spacing:.5px}
.logo span{color:var(--accent)}
#loginErr{color:var(--danger);font-size:12.5px;min-height:16px}

/* layout */
#app{display:none;height:100vh;flex-direction:row}
#sidebar{width:220px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:14px 10px;gap:4px;flex-shrink:0}
#sidebar .logo{padding:4px 10px 14px}
.bnav{padding:8px 10px;border-radius:6px;display:flex;align-items:center;gap:8px;color:var(--text);width:100%;text-align:left;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.bnav:hover{background:var(--accent-soft)}
.bnav.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{display:flex;align-items:center;gap:10px;padding:12px 20px;background:var(--panel);border-bottom:1px solid var(--border)}
#boardTitle{font-size:19px;font-weight:700;margin-right:6px}
.tabs{display:flex;gap:2px;background:var(--bg);border-radius:7px;padding:3px}
.tabs button{padding:5px 12px;border-radius:5px;color:var(--muted);font-weight:500}
.tabs button.active{background:#fff;color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08);font-weight:600}
#topRight{margin-left:auto;display:flex;align-items:center;gap:8px}
#bell{position:relative}
#bellCount{position:absolute;top:-2px;right:-2px;background:var(--danger);color:#fff;border-radius:9px;font-size:10px;padding:1px 5px;font-weight:700;display:none}

/* filter bar */
#filterbar{display:flex;gap:8px;align-items:center;padding:10px 20px;flex-wrap:wrap}
#filterbar input,#filterbar select{font-size:13px;padding:5px 8px}
#content{flex:1;overflow:auto;padding:0 20px 40px}

/* table view */
.group{margin-top:22px}
.group-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.group-head h3{font-size:15.5px;cursor:pointer}
.gtable{width:100%;border-collapse:collapse;background:var(--panel);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.gtable th{font-size:12px;color:var(--muted);font-weight:600;text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);background:#fafbfe;white-space:nowrap}
.gtable td{padding:5px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.gtable tr:last-child td{border-bottom:none}
.gtable tr.item:hover{background:#fafbff}
.iname{display:flex;align-items:center;gap:6px;font-weight:500}
.iname .exp{width:18px;color:var(--muted);flex-shrink:0}
.iname .nm{cursor:pointer}
.iname .nm:hover{color:var(--accent);text-decoration:underline}
.subrow{background:#fbfbfd}
.subrow td:first-child{padding-left:38px}
.subhead td{font-size:11.5px;color:var(--muted);background:#f4f5fa;padding:4px 10px}
.subhead td:first-child{padding-left:38px}
.cellv{display:inline-block;min-width:40px;min-height:18px;cursor:pointer;border-radius:4px;padding:2px 4px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cellv:hover{outline:1px solid var(--border)}
.status-chip{display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600;border-radius:4px;padding:3px 10px;min-width:86px;cursor:pointer;text-align:center}
.sumrow td{font-size:12px;color:var(--muted);background:#fafbfe;font-weight:600}
.addrow{color:var(--muted);font-size:13px;cursor:pointer}
.addrow:hover{color:var(--accent)}
.gsum{font-size:12px;color:var(--muted);font-weight:500;margin-left:4px}

/* kanban */
#kanban{display:flex;gap:14px;align-items:flex-start;padding-top:18px;overflow-x:auto}
.kcol{background:#eef0f6;border-radius:10px;min-width:250px;width:250px;padding:10px;flex-shrink:0}
.kcol h4{font-size:13px;margin-bottom:10px;display:flex;gap:6px;align-items:center}
.kdot{width:10px;height:10px;border-radius:3px;display:inline-block}
.kcard{background:#fff;border-radius:8px;padding:10px;margin-bottom:8px;box-shadow:0 1px 2px rgba(0,0,0,.07);cursor:grab;font-size:13px}
.kcard .kb{color:var(--muted);font-size:11.5px;margin-top:5px;display:flex;gap:8px;flex-wrap:wrap}
.kcol.dragover{outline:2px dashed var(--accent)}

/* calendar */
#calendar{padding-top:14px}
.calhead{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.calhead h3{font-size:16px;min-width:150px;text-align:center}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.caldow{background:#fafbfe;padding:6px;font-size:11.5px;color:var(--muted);font-weight:600;text-align:center}
.calday{background:#fff;min-height:96px;padding:4px;font-size:12px}
.calday.dim{background:#fafafa;color:#c0c3d0}
.calday.today .dnum{background:var(--accent);color:#fff}
.dnum{display:inline-flex;width:22px;height:22px;border-radius:11px;align-items:center;justify-content:center;font-weight:600;margin-bottom:3px}
.calev{border-radius:4px;color:#fff;padding:2px 5px;font-size:11px;margin-bottom:2px;cursor:grab;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.calday.dragover{outline:2px dashed var(--accent);outline-offset:-2px}

/* modal & panel */
.overlay{position:fixed;inset:0;background:rgba(25,28,40,.4);display:flex;align-items:center;justify-content:center;z-index:50}
.modal{background:#fff;border-radius:12px;padding:22px;width:520px;max-width:94vw;max-height:88vh;overflow:auto;display:flex;flex-direction:column;gap:12px}
.modal h3{font-size:16px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
#panel{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:95vw;background:#fff;border-left:1px solid var(--border);box-shadow:-6px 0 24px rgba(0,0,0,.08);z-index:40;display:flex;flex-direction:column}
#panelHead{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
#panelBody{flex:1;overflow:auto;padding:14px 18px;display:flex;flex-direction:column;gap:14px}
.ptabs{display:flex;gap:14px;border-bottom:1px solid var(--border);padding:0 18px}
.ptabs button{padding:9px 2px;color:var(--muted);font-weight:500;border-bottom:2px solid transparent}
.ptabs button.active{color:var(--accent);border-color:var(--accent)}
.comment{background:#f7f8fc;border-radius:8px;padding:9px 11px;font-size:13px}
.comment .meta{font-size:11.5px;color:var(--muted);margin-bottom:3px}
.logline{font-size:12.5px;color:var(--muted);padding:5px 0;border-bottom:1px dashed var(--border)}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{background:var(--accent-soft);color:var(--accent);border-radius:12px;padding:2px 10px;font-size:12px;font-weight:600;display:inline-flex;gap:6px;align-items:center}
.chip button{color:inherit;opacity:.6}
.small{font-size:12px;color:var(--muted)}
.autorule{border:1px solid var(--border);border-radius:8px;padding:10px;display:flex;justify-content:space-between;gap:8px;align-items:center;font-size:13px}
hr{border:none;border-top:1px solid var(--border)}
.menu{position:fixed;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:60;min-width:160px;padding:4px;display:flex;flex-direction:column}
.menu button{text-align:left;padding:7px 10px;border-radius:5px;font-size:13px}
.menu button:hover{background:var(--accent-soft)}
.menu button.danger{color:var(--danger)}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#22242e;color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;z-index:99;display:none}
</style>
</head>
<body>

<div id="login">
  <div class="card">
    <div class="logo">Lu<span>nes</span></div>
    <input id="lEmail" type="email" placeholder="Email" autocomplete="username">
    <input id="lPass" type="password" placeholder="Password" autocomplete="current-password">
    <div id="loginErr"></div>
    <button class="btn" id="lBtn" onclick="doLogin()">Sign in</button>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div class="logo">Lu<span>nes</span></div>
    <div id="boardList"></div>
    <button class="bnav" style="color:var(--muted)" onclick="addBoard()">+ New board</button>
    <div style="flex:1"></div>
    <button class="bnav" style="color:var(--muted)" onclick="logout()" id="userBtn">Sign out</button>
  </div>
  <div id="main">
    <div id="topbar">
      <span id="boardTitle"></span>
      <button class="icon-btn" onclick="boardMenu(event)" title="Board options">⋯</button>
      <div class="tabs">
        <button id="tab-table" class="active" onclick="setView('table')">Table</button>
        <button id="tab-kanban" onclick="setView('kanban')">Kanban</button>
        <button id="tab-calendar" onclick="setView('calendar')">Calendar</button>
      </div>
      <div id="topRight">
        <button class="btn sm ghost" onclick="openAutomations()">⚡ Automate</button>
        <button class="btn sm ghost" onclick="openColumns()">⚙ Columns</button>
        <button class="icon-btn" id="bell" onclick="openNotifs(event)">🔔<span id="bellCount"></span></button>
      </div>
    </div>
    <div id="filterbar">
      <input id="fSearch" placeholder="Search…" style="width:170px" oninput="renderView()">
      <select id="fPerson" onchange="renderView()"><option value="">Person: all</option></select>
      <select id="fStatusCol" onchange="fillStatusVals();renderView()"><option value="">Status: any column</option></select>
      <select id="fStatusVal" onchange="renderView()"><option value="">value: all</option></select>
      <span class="small">Date</span>
      <input id="fFrom" type="date" onchange="renderView()">
      <input id="fTo" type="date" onchange="renderView()">
      <button class="btn sm ghost" onclick="clearFilters()">Clear</button>
    </div>
    <div id="content"></div>
  </div>
</div>

<div id="toast"></div>
<script>
/* ================= CONFIG ================= */
const SUPA_URL='https://ybzrpqgofxkzaqasfsna.supabase.co';
const SUPA_KEY='sb_publishable_0I8ZhiGBgfjWKBwTHV3TSA_11Kj3Jid';
const sb=window.supabase.createClient(SUPA_URL,SUPA_KEY);
const GROUP_COLORS=['#579bfc','#00c875','#fdab3d','#e2445c','#a25ddc','#037f4c','#66ccff','#ff642e'];
const STATUS_COLORS=['#c4c4c4','#fdab3d','#00c875','#e2445c','#579bfc','#a25ddc','#333333','#ff158a'];

/* ================= STATE ================= */
let user=null, myName='';
let boards=[], curBoard=null, groups=[], cols=[], items=[], automations=[], notifs=[];
let view='table', collapsed={}, panelItem=null, panelTab='update';

const $=id=>document.getElementById(id);
const esc=s=>(s??'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid=()=>crypto.randomUUID();
const todayStr=()=>new Date().toISOString().slice(0,10);
function toast(m){const t=$('toast');t.textContent=m;t.style.display='block';clearTimeout(t._h);t._h=setTimeout(()=>t.style.display='none',2600)}
const fmtMoney=n=>'R$ '+Number(n||0).toLocaleString('pt-BR',{maximumFractionDigits:2});

/* ================= AUTH ================= */
async function doLogin(){
  $('lBtn').disabled=true;$('loginErr').textContent='';
  const {data,error}=await sb.auth.signInWithPassword({email:$('lEmail').value.trim(),password:$('lPass').value});
  $('lBtn').disabled=false;
  if(error){$('loginErr').textContent=error.message;return}
  start(data.user);
}
async function logout(){await sb.auth.signOut();location.reload()}
$('lPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
sb.auth.getSession().then(({data})=>{if(data.session)start(data.session.user)});

async function start(u){
  user=u;myName=u.email.split('@')[0];
  $('login').style.display='none';$('app').style.display='flex';
  $('userBtn').textContent='Sign out ('+myName+')';
  await loadBoards();
  await loadNotifs();
  runTimeAutomations();
}

/* ================= DATA ================= */
async function loadBoards(){
  const {data}=await sb.from('boards').select('*').order('position');
  boards=data||[];
  renderBoardNav();
  if(boards.length&&!curBoard)selectBoard(boards[0].id);
  else if(!boards.length){$('boardTitle').textContent='Create your first board →';$('content').innerHTML=''}
}
async function selectBoard(id){
  curBoard=boards.find(b=>b.id===id);
  renderBoardNav();
  $('boardTitle').textContent=curBoard.name;
  const [g,c,i,a]=await Promise.all([
    sb.from('groups').select('*').eq('board_id',id).order('position'),
    sb.from('board_columns').select('*').eq('board_id',id).order('position'),
    sb.from('items').select('*').eq('board_id',id).eq('archived',false).order('position'),
    sb.from('automations').select('*').eq('board_id',id)
  ]);
  groups=g.data||[];cols=c.data||[];items=i.data||[];automations=a.data||[];
  fillFilterOptions();
  renderView();
}
const itemCols=()=>cols.filter(c=>c.scope==='item');
const subCols=()=>cols.filter(c=>c.scope==='subitem');
const subsOf=id=>items.filter(x=>x.parent_id===id);
const topItems=()=>items.filter(x=>!x.parent_id);

async function addBoard(){
  const name=prompt('Board name:');if(!name)return;
  const {data,error}=await sb.from('boards').insert({name,position:boards.length}).select().single();
  if(error)return toast(error.message);
  // default setup
  const gs=[{board_id:data.id,name:'To Do',color:'#579bfc',position:0},{board_id:data.id,name:'Doing',color:'#fdab3d',position:1},{board_id:data.id,name:'Done',color:'#00c875',position:2}];
  await sb.from('groups').insert(gs);
  await sb.from('board_columns').insert([
    {board_id:data.id,scope:'item',name:'Person',type:'person',position:0,options:{}},
    {board_id:data.id,scope:'item',name:'Status',type:'status',position:1,options:{labels:[{name:'To Do',color:'#c4c4c4'},{name:'Working on it',color:'#fdab3d'},{name:'Done',color:'#00c875'},{name:'Stuck',color:'#e2445c'}]}},
    {board_id:data.id,scope:'item',name:'Date',type:'date',position:2,options:{}},
    {board_id:data.id,scope:'subitem',name:'Person',type:'person',position:0,options:{}},
    {board_id:data.id,scope:'subitem',name:'Status',type:'status',position:1,options:{labels:[{name:'To Do',color:'#c4c4c4'},{name:'Working on it',color:'#fdab3d'},{name:'Done',color:'#00c875'}]}},
    {board_id:data.id,scope:'subitem',name:'Date',type:'date',position:2,options:{}}
  ]);
  boards.push(data);renderBoardNav();selectBoard(data.id);
}
function boardMenu(e){
  menu(e,[
    ['Rename board',async()=>{const n=prompt('New name:',curBoard.name);if(!n)return;await sb.from('boards').update({name:n}).eq('id',curBoard.id);curBoard.name=n;$('boardTitle').textContent=n;renderBoardNav()}],
    ['Add group',async()=>{const n=prompt('Group name:');if(!n)return;const {data}=await sb.from('groups').insert({board_id:curBoard.id,name:n,color:GROUP_COLORS[groups.length%GROUP_COLORS.length],position:groups.length}).select().single();groups.push(data);renderView()}],
    ['!Delete board',async()=>{if(!confirm('Delete board "'+curBoard.name+'" and ALL its data?'))return;await sb.from('boards').delete().eq('id',curBoard.id);boards=boards.filter(b=>b.id!==curBoard.id);curBoard=null;loadBoards()}]
  ]);
}
function renderBoardNav(){
  $('boardList').innerHTML=boards.map(b=>`<button class="bnav ${curBoard&&b.id===curBoard.id?'active':''}" onclick="selectBoard('${b.id}')">▦ ${esc(b.name)}</button>`).join('');
}

/* ================= ITEM CRUD + ACTIVITY ================= */
async function createItem(groupId,parentId,name){
  const it={board_id:curBoard.id,group_id:groupId,parent_id:parentId,name,col_values:{},position:items.length,created_by:myName};
  const {data,error}=await sb.from('items').insert(it).select().single();
  if(error)return toast(error.message);
  items.push(data);
  logActivity(data.id,'created','', '');
  runAutomations('item_created',data);
  renderView();
}
async function updateItem(it,patch,activityField,oldV,newV){
  Object.assign(it,patch);
  patch.updated_at=new Date().toISOString();
  const {error}=await sb.from('items').update(patch).eq('id',it.id);
  if(error)return toast(error.message);
  if(activityField)logActivity(it.id,activityField,oldV,newV);
}
async function setCell(itemId,colId,val){
  const it=items.find(x=>x.id===itemId);const col=cols.find(c=>c.id===colId);
  const old=it.col_values[colId]??'';
  if(String(old)===String(val))return;
  it.col_values={...it.col_values,[colId]:val};
  await updateItem(it,{col_values:it.col_values},col.name,old,val);
  if(col.type==='status')runAutomations('status_changes',it,{colId,value:val});
  fillFilterOptions();renderView();if(panelItem===itemId)renderPanel();
}
async function logActivity(itemId,field,oldV,newV){
  await sb.from('activity_logs').insert({item_id:itemId,author:myName,field,old_value:String(oldV??''),new_value:String(newV??'')});
}
function itemMenu(e,id){
  const it=items.find(x=>x.id===id);
  const opts=[
    ['Open details',()=>openPanel(id)],
    ['Rename',async()=>{const n=prompt('Name:',it.name);if(!n)return;const o=it.name;await updateItem(it,{name:n},'name',o,n);renderView()}],
  ];
  if(!it.parent_id)opts.push(['Move to group…',()=>moveItemDialog(it)],['Duplicate',()=>duplicateItem(it,it.group_id)]);
  opts.push(['!Delete',async()=>{if(!confirm('Delete "'+it.name+'"?'))return;await sb.from('items').delete().eq('id',id);items=items.filter(x=>x.id!==id&&x.parent_id!==id);renderView()}]);
  menu(e,opts);
}
function moveItemDialog(it){
  menu(lastMenuEvent,groups.map(g=>[g.name,async()=>{await updateItem(it,{group_id:g.id},'group',groupName(it.group_id),g.name);renderView()}]));
}
const groupName=id=>groups.find(g=>g.id===id)?.name||'?';
async function duplicateItem(it,targetGroup,suffix){
  const copy={board_id:it.board_id,group_id:targetGroup,parent_id:null,name:it.name+(suffix||' (copy)'),col_values:it.col_values,position:items.length,created_by:myName};
  const {data}=await sb.from('items').insert(copy).select().single();
  const subs=subsOf(it.id).map(s=>({board_id:s.board_id,group_id:targetGroup,parent_id:data.id,name:s.name,col_values:s.col_values,position:s.position,created_by:myName}));
  if(subs.length){const {data:sd}=await sb.from('items').insert(subs).select();items.push(...(sd||[]))}
  items.push(data);renderView();return data;
}

/* ================= FILTERS ================= */
function fillFilterOptions(){
  const people=new Set();
  items.forEach(it=>cols.filter(c=>c.type==='person').forEach(c=>{const v=it.col_values[c.id];if(v)String(v).split(',').map(s=>s.trim()).filter(Boolean).forEach(p=>people.add(p))}));
  const fp=$('fPerson'),cur=fp.value;
  fp.innerHTML='<option value="">Person: all</option>'+[...people].sort().map(p=>`<option ${p===cur?'selected':''}>${esc(p)}</option>`).join('');
  const fc=$('fStatusCol'),curc=fc.value;
  fc.innerHTML='<option value="">Status: any column</option>'+cols.filter(c=>c.type==='status').map(c=>`<option value="${c.id}" ${c.id===curc?'selected':''}>${esc(c.name)} (${c.scope})</option>`).join('');
  fillStatusVals();
}
function fillStatusVals(){
  const colId=$('fStatusCol').value,fv=$('fStatusVal'),cur=fv.value;
  const col=cols.find(c=>c.id===colId);
  fv.innerHTML='<option value="">value: all</option>'+((col?.options?.labels)||[]).map(l=>`<option ${l.name===cur?'selected':''}>${esc(l.name)}</option>`).join('');
}
function clearFilters(){$('fSearch').value='';$('fPerson').value='';$('fStatusCol').value='';fillStatusVals();$('fFrom').value='';$('fTo').value='';renderView()}
function passFilter(it){
  const q=$('fSearch').value.toLowerCase();
  if(q&&!(it.name.toLowerCase().includes(q)||Object.values(it.col_values||{}).some(v=>String(v).toLowerCase().includes(q))))return false;
  const p=$('fPerson').value;
  if(p){const ok=cols.filter(c=>c.type==='person').some(c=>String(it.col_values[c.id]||'').includes(p));if(!ok)return false}
  const scol=$('fStatusCol').value,sval=$('fStatusVal').value;
  if(scol&&sval&&String(it.col_values[scol]||'')!==sval)return false;
  const from=$('fFrom').value,to=$('fTo').value;
  if(from||to){
    const dates=cols.filter(c=>c.type==='date').map(c=>it.col_values[c.id]).filter(Boolean);
    if(!dates.length)return false;
    if(!dates.some(d=>(!from||d>=from)&&(!to||d<=to)))return false;
  }
  return true;
}
// an item passes if itself or any sub passes; a sub shows if it passes
const itemVisible=it=>passFilter(it)||subsOf(it.id).some(passFilter);

/* ================= VIEWS ================= */
function setView(v){view=v;['table','kanban','calendar'].forEach(x=>$('tab-'+x).classList.toggle('active',x===v));renderView()}
function renderView(){
  if(!curBoard)return;
  if(view==='table')renderTable();
  else if(view==='kanban')renderKanban();
  else renderCalendar();
}

/* ---- cell rendering & editing ---- */
function cellHtml(it,col){
  const v=it.col_values[col.id];
  if(col.type==='status'){
    const lbl=(col.options.labels||[]).find(l=>l.name===v);
    return `<span class="status-chip" style="background:${lbl?lbl.color:'#c4c4c4'}" onclick="statusMenu(event,'${it.id}','${col.id}')">${esc(v||'—')}</span>`;
  }
  if(col.type==='checkbox')return `<input type="checkbox" ${v?'checked':''} onchange="setCell('${it.id}','${col.id}',this.checked)">`;
  if(col.type==='link')return v?`<a href="${esc(v)}" target="_blank" style="color:var(--accent)">🔗 link</a> <span class="cellv" style="min-width:12px" onclick="editCell(event,'${it.id}','${col.id}')">✎</span>`:`<span class="cellv" onclick="editCell(event,'${it.id}','${col.id}')"></span>`;
  let disp=v??'';
  if(col.type==='number'&&v!==''&&v!=null)disp=fmtMoney(v);
  return `<span class="cellv" onclick="editCell(event,'${it.id}','${col.id}')">${esc(disp)}</span>`;
}
function statusMenu(e,itemId,colId){
  const col=cols.find(c=>c.id===colId);
  menu(e,(col.options.labels||[]).map(l=>['●'+l.name,()=>setCell(itemId,colId,l.name),l.color]).concat([['— clear',()=>setCell(itemId,colId,'')]]));
}
function editCell(e,itemId,colId){
  e.stopPropagation();
  const it=items.find(x=>x.id===itemId),col=cols.find(c=>c.id===colId);
  const cur=it.col_values[colId]??'';
  const span=e.currentTarget;
  const inp=document.createElement('input');
  inp.type=col.type==='date'?'date':col.type==='number'?'number':'text';
  inp.value=cur;inp.style.width=col.type==='date'?'135px':'110px';inp.step='any';
  if(col.type==='person'){
    inp.setAttribute('list','peopleList');ensurePeopleDatalist();
  }
  span.replaceWith(inp);inp.focus();
  const done=()=>setCell(itemId,colId,inp.value);
  inp.addEventListener('blur',done);
  inp.addEventListener('keydown',ev=>{if(ev.key==='Enter')inp.blur();if(ev.key==='Escape'){inp.removeEventListener('blur',done);renderView()}});
}
function ensurePeopleDatalist(){
  let dl=$('peopleList');
  if(!dl){dl=document.createElement('datalist');dl.id='peopleList';document.body.appendChild(dl)}
  const people=new Set();
  items.forEach(it=>cols.filter(c=>c.type==='person').forEach(c=>{const v=it.col_values[c.id];if(v)people.add(String(v))}));
  dl.innerHTML=[...people].map(p=>`<option value="${esc(p)}">`).join('');
}

/* ---- TABLE ---- */
function renderTable(){
  const ic=itemCols(),sc=subCols();
  let html='';
  for(const g of groups){
    const gi=topItems().filter(x=>x.group_id===g.id&&itemVisible(x));
    const isCol=collapsed[g.id];
    // sums
    const sums=ic.filter(c=>c.type==='number').map(c=>{
      const t=gi.reduce((s,it)=>s+(parseFloat(it.col_values[c.id])||0),0);
      return {c,t};
    });
    html+=`<div class="group">
      <div class="group-head">
        <h3 style="color:${g.color}" onclick="collapsed['${g.id}']=!collapsed['${g.id}'];renderView()">${isCol?'▸':'▾'} ${esc(g.name)}</h3>
        <span class="gsum">${gi.length} items${sums.map(s=>' · '+esc(s.c.name)+': '+fmtMoney(s.t)).join('')}</span>
        <button class="icon-btn" onclick="groupMenu(event,'${g.id}')">⋯</button>
      </div>`;
    if(!isCol){
      html+=`<table class="gtable"><tr><th style="min-width:260px">Item</th>${ic.map(c=>`<th>${esc(c.name)}</th>`).join('')}<th style="width:36px"></th></tr>`;
      for(const it of gi){
        const subs=subsOf(it.id);
        const shown=collapsed['x'+it.id];
        html+=`<tr class="item"><td><div class="iname">
          <button class="exp" onclick="collapsed['x${it.id}']=!collapsed['x${it.id}'];renderView()">${subs.length?(shown?'▾':'▸'):'·'}</button>
          <span class="nm" onclick="openPanel('${it.id}')">${esc(it.name)}</span>
          ${subs.length?`<span class="small">${subs.length}</span>`:''}
        </div></td>
        ${ic.map(c=>`<td>${cellHtml(it,c)}</td>`).join('')}
        <td><button class="icon-btn" onclick="itemMenu(event,'${it.id}')">⋯</button></td></tr>`;
        if(shown){
          html+=`<tr class="subhead"><td>Subitem</td>${sc.map(c=>`<td>${esc(c.name)}</td>`).join('')}<td colspan="${Math.max(0,ic.length-sc.length)+1}"></td></tr>`;
          for(const s of subs.filter(s=>passFilter(s)||passFilter(it))){
            html+=`<tr class="subrow"><td><span class="nm cellv" onclick="openPanel('${s.id}')">${esc(s.name)}</span></td>
            ${sc.map(c=>`<td>${cellHtml(s,c)}</td>`).join('')}
            <td colspan="${Math.max(0,ic.length-sc.length)}"></td>
            <td><button class="icon-btn" onclick="itemMenu(event,'${s.id}')">⋯</button></td></tr>`;
          }
          html+=`<tr class="subrow"><td colspan="${sc.length+2}" class="addrow" onclick="promptAdd('${g.id}','${it.id}')">+ Add subitem</td></tr>`;
        }
      }
      html+=`<tr><td colspan="${ic.length+2}" class="addrow" onclick="promptAdd('${g.id}',null)">+ Add item</td></tr>`;
      if(sums.length&&gi.length)html+=`<tr class="sumrow"><td></td>${ic.map(c=>{const s=sums.find(x=>x.c.id===c.id);return `<td>${s?fmtMoney(s.t):''}</td>`}).join('')}<td></td></tr>`;
      html+='</table>';
    }
    html+='</div>';
  }
  if(!groups.length)html='<p style="margin-top:30px" class="small">No groups yet — use ⋯ next to the board title to add one.</p>';
  $('content').innerHTML=html;
}
function promptAdd(groupId,parentId){
  const n=prompt(parentId?'Subitem name:':'Item name:');if(!n)return;
  createItem(groupId,parentId,n);
}
function groupMenu(e,gid){
  const g=groups.find(x=>x.id===gid);
  menu(e,[
    ['Rename',async()=>{const n=prompt('Group name:',g.name);if(!n)return;await sb.from('groups').update({name:n}).eq('id',gid);g.name=n;renderView()}],
    ['Change color',()=>{menu(lastMenuEvent,GROUP_COLORS.map(c=>['●'+c,async()=>{await sb.from('groups').update({color:c}).eq('id',gid);g.color=c;renderView()},c]))}],
    ['!Delete group',async()=>{if(!confirm('Delete group and its items?'))return;await sb.from('groups').delete().eq('id',gid);groups=groups.filter(x=>x.id!==gid);items=items.filter(x=>x.group_id!==gid);renderView()}]
  ]);
}

/* ---- KANBAN ---- */
function kanbanStatusCol(){
  const saved=curBoard.kstatus&&cols.find(c=>c.id===curBoard.kstatus);
  return saved||cols.find(c=>c.scope==='item'&&c.type==='status');
}
function renderKanban(){
  const col=kanbanStatusCol();
  if(!col){$('content').innerHTML='<p class="small" style="margin-top:30px">Add a status column to use Kanban.</p>';return}
  const labels=col.options.labels||[];
  const pool=topItems().filter(itemVisible);
  const other=cols.filter(c=>c.scope==='item'&&c.type==='status'&&c.id!==col.id);
  let html=`<div class="row" style="padding:14px 0 0"><span class="small">Kanban by:</span>
    <select onchange="curBoard.kstatus=this.value;renderView()">${cols.filter(c=>c.scope==='item'&&c.type==='status').map(c=>`<option value="${c.id}" ${c.id===col.id?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>`;
  html+='<div id="kanban">';
  const buckets=[...labels.map(l=>l.name),''];
  for(const b of buckets){
    const list=pool.filter(it=>String(it.col_values[col.id]||'')===b);
    if(b===''&&!list.length)continue;
    const lbl=labels.find(l=>l.name===b);
    html+=`<div class="kcol" data-val="${esc(b)}" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="kdrop(event,'${col.id}')">
      <h4><span class="kdot" style="background:${lbl?lbl.color:'#c4c4c4'}"></span>${esc(b||'No status')} <span class="small">${list.length}</span></h4>
      ${list.map(it=>{
        const person=cols.filter(c=>c.type==='person'&&c.scope==='item').map(c=>it.col_values[c.id]).filter(Boolean).join(', ');
        const date=cols.filter(c=>c.type==='date'&&c.scope==='item').map(c=>it.col_values[c.id]).filter(Boolean)[0];
        return `<div class="kcard" draggable="true" ondragstart="event.dataTransfer.setData('t','${it.id}')" onclick="openPanel('${it.id}')">
          <div>${esc(it.name)}</div>
          <div class="kb">${person?'👤 '+esc(person):''} ${date?'📅 '+date:''} <span>${esc(groupName(it.group_id))}</span></div>
        </div>`}).join('')}
    </div>`;
  }
  html+='</div>';
  $('content').innerHTML=html;
}
function kdrop(e,colId){
  e.preventDefault();
  const kc=e.currentTarget;kc.classList.remove('dragover');
  const id=e.dataTransfer.getData('t');
  if(id)setCell(id,colId,kc.dataset.val);
}

/* ---- CALENDAR ---- */
let calMonth=new Date();
function calDateCol(){
  const saved=curBoard.cdate&&cols.find(c=>c.id===curBoard.cdate);
  return saved||cols.find(c=>c.type==='date'&&c.scope==='item')||cols.find(c=>c.type==='date');
}
function renderCalendar(){
  const dcol=calDateCol();
  if(!dcol){$('content').innerHTML='<p class="small" style="margin-top:30px">Add a date column to use Calendar.</p>';return}
  const y=calMonth.getFullYear(),m=calMonth.getMonth();
  const first=new Date(y,m,1),startDow=(first.getDay()+6)%7;
  const daysIn=new Date(y,m+1,0).getDate();
  const dateCols=cols.filter(c=>c.type==='date');
  let html=`<div id="calendar"><div class="calhead">
    <button class="btn sm ghost" onclick="calMonth=new Date(${y},${m-1},1);renderView()">‹</button>
    <h3>${calMonth.toLocaleString('en',{month:'long'})} ${y}</h3>
    <button class="btn sm ghost" onclick="calMonth=new Date(${y},${m+1},1);renderView()">›</button>
    <button class="btn sm ghost" onclick="calMonth=new Date();renderView()">Today</button>
    <span class="small">Date column:</span>
    <select onchange="curBoard.cdate=this.value;renderView()">${dateCols.map(c=>`<option value="${c.id}" ${c.id===dcol.id?'selected':''}>${esc(c.name)} (${c.scope})</option>`).join('')}</select>
  </div><div class="calgrid">`;
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d=>html+=`<div class="caldow">${d}</div>`);
  const pool=items.filter(it=>passFilter(it));
  const today=todayStr();
  for(let cell=0;cell<Math.ceil((startDow+daysIn)/7)*7;cell++){
    const dnum=cell-startDow+1;
    if(dnum<1||dnum>daysIn){html+='<div class="calday dim"></div>';continue}
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(dnum).padStart(2,'0')}`;
    const evs=pool.filter(it=>it.col_values[dcol.id]===ds);
    html+=`<div class="calday ${ds===today?'today':''}" data-d="${ds}" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="cdrop(event,'${dcol.id}')">
      <span class="dnum">${dnum}</span>
      ${evs.map(it=>{const g=groups.find(x=>x.id===it.group_id);return `<div class="calev" style="background:${g?g.color:'#579bfc'}" draggable="true" ondragstart="event.dataTransfer.setData('t','${it.id}')" onclick="openPanel('${it.id}')" title="${esc(it.name)}">${it.parent_id?'↳ ':''}${esc(it.name)}</div>`}).join('')}
    </div>`;
  }
  html+='</div></div>';
  $('content').innerHTML=html;
}
function cdrop(e,colId){
  e.preventDefault();
  const el=e.currentTarget;el.classList.remove('dragover');
  const id=e.dataTransfer.getData('t');
  if(id)setCell(id,colId,el.dataset.d);
}

/* ================= GENERIC MENU ================= */
let lastMenuEvent=null;
function menu(e,options){
  e.stopPropagation?.();lastMenuEvent=e;
  document.querySelectorAll('.menu').forEach(m=>m.remove());
  const m=document.createElement('div');m.className='menu';
  options.forEach(([label,fn,color])=>{
    const b=document.createElement('button');
    const danger=label.startsWith('!');
    b.textContent=danger?label.slice(1):label;
    if(danger)b.className='danger';
    if(color){b.style.color=color}
    b.onclick=()=>{m.remove();fn()};
    m.appendChild(b);
  });
  document.body.appendChild(m);
  const x=Math.min(e.clientX||100,innerWidth-190),yy=Math.min(e.clientY||100,innerHeight-m.offsetHeight-10);
  m.style.left=x+'px';m.style.top=yy+'px';
  setTimeout(()=>document.addEventListener('click',()=>m.remove(),{once:true}));
}

/* ================= ITEM PANEL (comments + activity) ================= */
async function openPanel(id){
  panelItem=id;panelTab='update';
  renderPanelShell();renderPanel();
}
function closePanel(){document.querySelector('#panel')?.remove();panelItem=null}
function renderPanelShell(){
  document.querySelector('#panel')?.remove();
  const d=document.createElement('div');d.id='panel';
  d.innerHTML=`<div id="panelHead"><b id="panelName" style="font-size:16px"></b><div style="flex:1"></div><button class="icon-btn" onclick="closePanel()">✕</button></div>
  <div class="ptabs">
    <button id="pt-update" class="active" onclick="panelTab='update';renderPanel()">Comments</button>
    <button id="pt-log" onclick="panelTab='log';renderPanel()">Activity log</button>
    <button id="pt-cols" onclick="panelTab='cols';renderPanel()">Values</button>
  </div><div id="panelBody"></div>`;
  document.body.appendChild(d);
}
async function renderPanel(){
  const it=items.find(x=>x.id===panelItem);
  if(!it)return closePanel();
  $('panelName').textContent=(it.parent_id?'↳ ':'')+it.name;
  ['update','log','cols'].forEach(t=>$('pt-'+t).classList.toggle('active',panelTab===t));
  const body=$('panelBody');
  if(panelTab==='update'){
    const {data}=await sb.from('comments').select('*').eq('item_id',it.id).order('created_at',{ascending:false});
    body.innerHTML=`<div class="row"><textarea id="cmtBox" placeholder="Write a comment…" style="flex:1;min-height:60px"></textarea></div>
      <button class="btn sm" style="align-self:flex-start" onclick="postComment()">Comment</button>
      ${(data||[]).map(c=>`<div class="comment"><div class="meta">${esc(c.author)} · ${new Date(c.created_at).toLocaleString()}</div>${esc(c.body)}</div>`).join('')||'<p class="small">No comments yet.</p>'}`;
  }else if(panelTab==='log'){
    const {data}=await sb.from('activity_logs').select('*').eq('item_id',it.id).order('created_at',{ascending:false}).limit(200);
    body.innerHTML=(data||[]).map(l=>{
      const what=l.field==='created'?'created this item':`changed <b>${esc(l.field)}</b>${l.old_value?` from "${esc(l.old_value)}"`:''} to "${esc(l.new_value)}"`;
      return `<div class="logline"><b>${esc(l.author||'?')}</b> ${what}<br><span style="font-size:11px">${new Date(l.created_at).toLocaleString()}</span></div>`;
    }).join('')||'<p class="small">No activity.</p>';
  }else{
    const cc=it.parent_id?subCols():itemCols();
    body.innerHTML=`<p class="small">Created by ${esc(it.created_by||'?')} · ${new Date(it.created_at).toLocaleString()}</p>`+
      cc.map(c=>`<div class="row"><span style="width:110px" class="small">${esc(c.name)}</span>${cellHtml(it,c)}</div>`).join('');
  }
}
async function postComment(){
  const t=$('cmtBox').value.trim();if(!t)return;
  await sb.from('comments').insert({item_id:panelItem,author:myName,body:t});
  renderPanel();
}

function openColumns(){
  overlay(`<h3>Columns — ${esc(curBoard.name)}</h3>
    <div class="tabs" style="align-self:flex-start"><button id="ct-item" class="active" onclick="colTab('item')">Item columns</button><button id="ct-subitem" onclick="colTab('subitem')">Subitem columns</button></div>

    <hr><div class="row">
      <input id="ncName" placeholder="Column name" style="flex:1">
      <select id="ncType"><option>text</option><option>number</option><option>date</option><option>status</option><option>person</option><option>label</option><option>link</option><option>checkbox</option></select>
      <button class="btn sm" onclick="addColumn()">Add</button>
    </div>`);
  window._colScope='item';renderColList();

function colTab(s){window._colScope=s;$('ct-item').classList.toggle('active',s==='item');$('ct-subitem').classList.toggle('active',s==='subitem');renderColList()}
function renderColList(){
  const list=cols.filter(c=>c.scope===window._colScope);
  $('colList').innerHTML=list.map(c=>`<div class="autorule"><span><b>${esc(c.name)}</b> <span class="small">${c.type}</span>
    ${c.type==='status'?`<div class="chips" style="margin-top:6px">${(c.options.labels||[]).map((l,i)=>`<span class="chip" style="background:${l.color}22;color:${l.color}">${esc(l.name)}<button onclick="delLabel('${c.id}',${i})">✕</button></span>`).join('')}<button class="btn sm ghost" onclick="addLabel('${c.id}')">+ label</button></div>`:''}
    </span>
    <span><button class="icon-btn" onclick="renameCol('${c.id}')">✎</button><button class="icon-btn" style="color:var(--danger)" onclick="delCol('${c.id}')">🗑</button></span></div>`).join('')||'<p class="small">No columns.</p>';
}
async function addColumn(){
  const name=$('ncName').value.trim();if(!name)return;
  const type=$('ncType').value;
  const options=type==='status'?{labels:[{name:'To Do',color:'#c4c4c4'},{name:'Working on it',color:'#fdab3d'},{name:'Done',color:'#00c875'}]}:{};
  const {data,error}=await sb.from('board_columns').insert({board_id:curBoard.id,scope:window._colScope,name,type,options,position:cols.length}).select().single();
  if(error)return toast(error.message);
  cols.push(data);$('ncName').value='';renderColList();fillFilterOptions();renderView();
}
async function renameCol(id){
  const c=cols.find(x=>x.id===id);const n=prompt('Column name:',c.name);if(!n)return;
  await sb.from('board_columns').update({name:n}).eq('id',id);c.name=n;renderColList();renderView();
}
async function delCol(id){
  if(!confirm('Delete this column? Values will be lost.'))return;
  await sb.from('board_columns').delete().eq('id',id);cols=cols.filter(c=>c.id!==id);renderColList();fillFilterOptions();renderView();
}
async function addLabel(colId){
  const c=cols.find(x=>x.id===colId);const n=prompt('Label name:');if(!n)return;
  const color=STATUS_COLORS[(c.options.labels||[]).length%STATUS_COLORS.length];
  c.options.labels=[...(c.options.labels||[]),{name:n,color}];
  await sb.from('board_columns').update({options:c.options}).eq('id',colId);renderColList();renderView();
}
async function delLabel(colId,i){
  const c=cols.find(x=>x.id===colId);c.options.labels.splice(i,1);
  await sb.from('board_columns').update({options:c.options}).eq('id',colId);renderColList();renderView();
}
function overlay(inner){
  document.querySelector('.overlay')?.remove();
  const o=document.createElement('div');o.className='overlay';
  o.innerHTML=`<div class="modal">${inner}<button class="btn ghost" style="align-self:flex-end" onclick="this.closest('.overlay').remove()">Close</button></div>`;
  o.addEventListener('click',e=>{if(e.target===o)o.remove()});
  document.body.appendChild(o);
}

function autoTrigUI(){
  const t=$('aTrig').value,x=$('aTrigX');
  if(t==='status_changes')x.innerHTML=`<select id="aTc">${window._sCols.map(c=>`<option value="${c.id}">${esc(c.name)} (${c.scope})</option>`).join('')}</select> to <select id="aTv"></select>`,fillTv();
  else if(t==='date_arrives')x.innerHTML=`<select id="aTc">${window._dCols.map(c=>`<option value="${c.id}">${esc(c.name)} (${c.scope})</option>`).join('')}</select>`;
  else if(t==='monthly')x.innerHTML=`day <input id="aTd" type="number" min="1" max="28" value="1" style="width:60px"> — applies to items in group <select id="aTg">${groups.map(g=>`<option value="${g.id}">${esc(g.name)}</option>`).join('')}</select>`;
  else x.innerHTML='';
  const tc=$('aTc');if(tc&&t==='status_changes')tc.onchange=fillTv;
}
function fillTv(){
  const c=cols.find(x=>x.id===$('aTc').value);
  $('aTv').innerHTML=((c?.options?.labels)||[]).map(l=>`<option>${esc(l.name)}</option>`).join('');
}
function autoActUI(){
  const a=$('aAct').value,x=$('aActX');
  if(a==='move_group'||a==='duplicate')x.innerHTML=`<select id="aAg">${groups.map(g=>`<option value="${g.id}">${esc(g.name)}</option>`).join('')}</select>`;
  else if(a==='set_column')x.innerHTML=`<select id="aAc">${cols.map(c=>`<option value="${c.id}">${esc(c.name)} (${c.scope})</option>`).join('')}</select> = <input id="aAv" style="width:110px" placeholder="value">`;
  else if(a==='notify')x.innerHTML=`<input id="aAe" placeholder="user email" style="width:180px"> msg: <input id="aAm" placeholder="message (optional)" style="width:160px">`;
  else x.innerHTML='';
}
async function saveAutomation(){
  const t=$('aTrig').value,a=$('aAct').value;
  const trigger={type:t};
  if(t==='status_changes'){trigger.colId=$('aTc').value;trigger.value=$('aTv').value}
  if(t==='date_arrives')trigger.colId=$('aTc').value;
  if(t==='monthly'){trigger.day=parseInt($('aTd').value)||1;trigger.groupId=$('aTg').value}
  const action={type:a};
  if(a==='move_group'||a==='duplicate')action.groupId=$('aAg').value;
  if(a==='set_column'){action.colId=$('aAc').value;action.value=$('aAv').value}
  if(a==='notify'){action.email=$('aAe').value.trim();action.message=$('aAm').value.trim();if(!action.email)return toast('Email required')}
  const {data,error}=await sb.from('automations').insert({board_id:curBoard.id,trigger,action}).select().single();
  if(error)return toast(error.message);
  automations.push(data);renderAutoList();toast('Rule added');
}
function describeAuto(a){
  const t=a.trigger,ac=a.action;
  const cn=id=>cols.find(c=>c.id===id)?.name||'?';
  const gn=id=>groups.find(g=>g.id===id)?.name||'?';
  let s='When ';
  if(t.type==='status_changes')s+=`<b>${esc(cn(t.colId))}</b> → "${esc(t.value)}"`;
  else if(t.type==='date_arrives')s+=`<b>${esc(cn(t.colId))}</b> arrives`;
  else if(t.type==='monthly')s+=`every month day ${t.day} (group <b>${esc(gn(t.groupId))}</b>)`;
  else s+='item is created';
  s+=', then ';
  if(ac.type==='move_group')s+=`move to <b>${esc(gn(ac.groupId))}</b>`;
  else if(ac.type==='set_column')s+=`set <b>${esc(cn(ac.colId))}</b> = "${esc(ac.value)}"`;
  else if(ac.type==='duplicate')s+=`duplicate into <b>${esc(gn(ac.groupId))}</b>`;
  else if(ac.type==='archive')s+='archive item';
  else s+=`notify <b>${esc(ac.email)}</b>`;
  return s;
}
function renderAutoList(){
  $('autoList').innerHTML=automations.map(a=>`<div class="autorule"><span>${describeAuto(a)} ${a.enabled?'':'<span class="small">(off)</span>'}</span>
    <span><button class="icon-btn" title="toggle" onclick="toggleAuto('${a.id}')">${a.enabled?'⏸':'▶'}</button>
    <button class="icon-btn" style="color:var(--danger)" onclick="delAuto('${a.id}')">🗑</button></span></div>`).join('')||'<p class="small">No rules yet.</p>';
}
async function toggleAuto(id){const a=automations.find(x=>x.id===id);a.enabled=!a.enabled;await sb.from('automations').update({enabled:a.enabled}).eq('id',id);renderAutoList()}
async function delAuto(id){await sb.from('automations').delete().eq('id',id);automations=automations.filter(x=>x.id!==id);renderAutoList()}
async function loadAutoLog(){
  const {data}=await sb.from('automation_logs').select('*').eq('board_id',curBoard.id).order('created_at',{ascending:false}).limit(50);
  const el=$('autoLog');if(!el)return;
  el.innerHTML=(data||[]).map(l=>`<div class="logline">${esc(l.message)}<br><span style="font-size:11px">${new Date(l.created_at).toLocaleString()}</span></div>`).join('')||'No executions yet.';
}
async function autoLog(boardId,autoId,itemId,message){
  await sb.from('automation_logs').insert({board_id:boardId,automation_id:autoId,item_id:itemId,message});
}

/* ---- engine ---- */
async function execAction(a,it){
  const ac=a.action;
  if(ac.type==='move_group'&&!it.parent_id){await updateItem(it,{group_id:ac.groupId},'group',groupName(it.group_id),groupName(ac.groupId))}
  else if(ac.type==='set_column'){const old=it.col_values[ac.colId]??'';it.col_values={...it.col_values,[ac.colId]:ac.value};await updateItem(it,{col_values:it.col_values},cols.find(c=>c.id===ac.colId)?.name||'column',old,ac.value)}
  else if(ac.type==='duplicate'){await duplicateItem(it,ac.groupId,' | '+new Date().toLocaleDateString('en',{month:'short',year:'numeric'}))}
  else if(ac.type==='archive'){await updateItem(it,{archived:true});items=items.filter(x=>x.id!==it.id&&x.parent_id!==it.id)}
  else if(ac.type==='notify'){await sb.from('notifications').insert({user_email:ac.email,message:(ac.message||'Automation alert')+' — "'+it.name+'" ('+curBoard.name+')',board_id:it.board_id,item_id:it.id})}
  await autoLog(it.board_id,a.id,it.id,'Rule ['+describeAuto(a).replace(/<[^>]+>/g,'')+'] ran on "'+it.name+'"');
}
async function runAutomations(evType,it,ctx){
  for(const a of automations.filter(a=>a.enabled&&a.trigger.type===evType)){
    const t=a.trigger;
    if(evType==='status_changes'&&(t.colId!==ctx.colId||String(t.value)!==String(ctx.value)))continue;
    await execAction(a,it);
  }
  renderView();
}
async function runTimeAutomations(){
  // runs across ALL boards on app load
  const {data:autos}=await sb.from('automations').select('*').eq('enabled',true);
  const timeAutos=(autos||[]).filter(a=>['date_arrives','monthly'].includes(a.trigger.type));
  if(!timeAutos.length)return;
  const {data:allItems}=await sb.from('items').select('*').eq('archived',false);
  const {data:allBoards}=await sb.from('boards').select('*');
  const {data:allGroups}=await sb.from('groups').select('*');
  const {data:allCols}=await sb.from('board_columns').select('*');
  const now=new Date(),ym=now.toISOString().slice(0,7),today=todayStr();
  for(const a of timeAutos){
    const t=a.trigger;
    const bItems=(allItems||[]).filter(x=>x.board_id===a.board_id);
    if(t.type==='monthly'){
      if((t.last_run||'')>=ym||now.getDate()<t.day)continue;
      // duplicate/notify/etc every top item of the source group
      const src=bItems.filter(x=>x.group_id===t.groupId&&!x.parent_id);
      for(const it of src)await execTimeAction(a,it,allBoards,allGroups,allCols,allItems);
      t.last_run=ym;
      await sb.from('automations').update({trigger:t}).eq('id',a.id);
    }else{ // date_arrives
      for(const it of bItems){
        const dv=it.col_values?.[t.colId];
        if(!dv||dv>today)continue;
        const done=it.col_values['_auto_'+a.id];
        if(done)continue;
        await execTimeAction(a,it,allBoards,allGroups,allCols,allItems);
        it.col_values={...it.col_values,['_auto_'+a.id]:today};
        await sb.from('items').update({col_values:it.col_values}).eq('id',it.id);
      }
    }
  }
  if(curBoard)selectBoard(curBoard.id);
  loadNotifs();
}
async function execTimeAction(a,it,allBoards,allGroups,allCols,allItems){
  const ac=a.action;
  const bName=(allBoards||[]).find(b=>b.id===it.board_id)?.name||'';
  const gName=id=>(allGroups||[]).find(g=>g.id===id)?.name||'?';
  if(ac.type==='move_group'&&!it.parent_id)await sb.from('items').update({group_id:ac.groupId}).eq('id',it.id);
  else if(ac.type==='set_column'){const cv={...it.col_values,[ac.colId]:ac.value};it.col_values=cv;await sb.from('items').update({col_values:cv}).eq('id',it.id)}
  else if(ac.type==='archive')await sb.from('items').update({archived:true}).eq('id',it.id);
  else if(ac.type==='notify')await sb.from('notifications').insert({user_email:ac.email,message:(ac.message||'Automation alert')+' — "'+it.name+'" ('+bName+')',board_id:it.board_id,item_id:it.id});
  else if(ac.type==='duplicate'){
    const suffix=' | '+new Date().toLocaleDateString('en',{month:'short',year:'numeric'});
    const {data:ni}=await sb.from('items').insert({board_id:it.board_id,group_id:ac.groupId,name:it.name+suffix,col_values:it.col_values,created_by:'automation'}).select().single();
    const subs=(allItems||[]).filter(s=>s.parent_id===it.id).map(s=>({board_id:s.board_id,group_id:ac.groupId,parent_id:ni.id,name:s.name,col_values:s.col_values,created_by:'automation'}));
    if(subs.length)await sb.from('items').insert(subs);
  }
  await autoLog(it.board_id,a.id,it.id,'Rule ran on "'+it.name+'" (time-based)');
}

/* ================= NOTIFICATIONS ================= */
async function loadNotifs(){
  const {data}=await sb.from('notifications').select('*').eq('user_email',user.email).order('created_at',{ascending:false}).limit(50);
  notifs=data||[];
  const unread=notifs.filter(n=>!n.read).length;
  const bc=$('bellCount');bc.style.display=unread?'block':'none';bc.textContent=unread;
}
function openNotifs(e){
  menu(e,notifs.length?notifs.slice(0,15).map(n=>[(n.read?'· ':'● ')+n.message.slice(0,70),async()=>{
    await sb.from('notifications').update({read:true}).eq('id',n.id);n.read=true;loadNotifs();
  }]).concat([['Mark all read',async()=>{await sb.from('notifications').update({read:true}).eq('user_email',user.email);loadNotifs()}]]):[['No notifications',()=>{}]]);
}
