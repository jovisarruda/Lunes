<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lunes</title><!-- v2.6 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --bg:#f4f6f7;--panel:#fff;--border:#d5d9e2;--text:#1d1f28;--muted:#7d8296;
  --accent:#4f6ef7;--accent-soft:#eef1fe;--danger:#e2445c;--ok:#00c875;--green:#00a97a;--green-soft:#e6f6f0;
  --r:8px;font-size:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font:inherit;color:inherit;border:1px solid var(--border);border-radius:6px;padding:6px 8px;background:#fff;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
.btn{padding:7px 14px;border-radius:6px;background:var(--accent);color:#fff;font-weight:600}
.btn:hover{filter:brightness(1.08)}
.btn.ghost{background:none;color:var(--muted);border:1px solid var(--border)}
.btn.ghost:hover{color:var(--text);background:var(--accent-soft)}
.btn.sm{padding:4px 9px;font-size:12.5px}
.icon-btn{padding:6px;border-radius:6px;color:var(--muted);line-height:1}
.icon-btn:hover{background:var(--accent-soft);color:var(--accent)}

/* login */
#login{height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px}
#login .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:36px;width:340px;display:flex;flex-direction:column;gap:12px;box-shadow:0 8px 30px rgba(30,40,90,.06)}
.logo{font-size:26px;font-weight:700;letter-spacing:.5px}
.logo span{color:var(--green)}
#loginErr{color:var(--danger);font-size:12.5px;min-height:16px}

/* layout */
#app{display:none;height:100vh;flex-direction:row}
#sidebar{width:220px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:14px 10px;gap:4px;flex-shrink:0}
#sidebar .logo{padding:4px 10px 14px}
.bnav{padding:8px 10px;border-radius:6px;display:flex;align-items:center;gap:8px;color:var(--text);width:100%;text-align:left;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.bnav:hover{background:var(--green-soft)}
.bnav.active{background:var(--green-soft);color:var(--green);font-weight:600;box-shadow:inset 3px 0 0 var(--green)}
#sidebar.min{width:58px;padding:14px 5px}
#sidebar.min .logo{font-size:20px;padding:4px 0 14px;text-align:center}
.rz{position:absolute;right:-3px;top:0;bottom:0;width:7px;cursor:col-resize;z-index:2}
.rz:hover{background:var(--green);opacity:.5}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{display:flex;align-items:center;gap:10px;padding:12px 20px;background:var(--panel);border-bottom:1px solid var(--border)}
#boardTitle{font-size:19px;font-weight:700;margin-right:6px}
.tabs{display:flex;gap:2px;background:var(--bg);border-radius:7px;padding:3px}
.tabs button{padding:5px 12px;border-radius:5px;color:var(--muted);font-weight:500}
.tabs button.active{background:#fff;color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08);font-weight:600}
#topRight{margin-left:auto;display:flex;align-items:center;gap:8px}
#bell{position:relative}
#bellCount{position:absolute;top:-2px;right:-2px;background:var(--danger);color:#fff;border-radius:9px;font-size:10px;padding:1px 5px;font-weight:700;display:none}

/* filter bar */
#filterbar{display:flex;gap:8px;align-items:center;padding:10px 20px;flex-wrap:wrap}
#filterbar input,#filterbar select{font-size:13px;padding:5px 8px}
#content{flex:1;overflow:auto;padding:0 20px 40px}

/* table view */
.group{margin-top:22px}
.group-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.group-head h3{font-size:15.5px;cursor:pointer}
.gtable{width:100%;border-collapse:collapse;background:var(--panel);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.gtable{border:1px solid var(--border)}
.gtable th{font-size:12px;color:var(--muted);font-weight:600;text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);border-right:1px solid #e8eaf1;background:#f6faf8;white-space:nowrap;overflow:hidden}
.gtable td{padding:5px 10px;border-bottom:1px solid var(--border);border-right:1px solid #eceef4;vertical-align:middle;overflow:hidden}
.gtable tr:last-child td{border-bottom:none}
.gtable tr.item:hover{background:#fafbff}
.iname{display:flex;align-items:center;gap:6px;font-weight:500;overflow:hidden}
.iname .exp{width:18px;color:var(--muted);flex-shrink:0}
.iname .nm{cursor:pointer;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.iname .nm:hover{color:var(--accent);text-decoration:underline}
.subrow{background:#fbfbfd}
.subhead td{font-size:11.5px;color:var(--muted);background:#f4f5fa;padding:4px 10px}
.subwrap>td{padding:4px 0 8px 38px;background:#fbfbfd}
.subtable{background:#fbfbfd}
.subtable th{background:#f4f5fa;font-size:11.5px}
.nm-edit{opacity:0;padding:1px 4px;font-size:12px;flex-shrink:0;border-radius:4px;color:var(--muted);transition:opacity .12s}
.nm-edit:hover{background:var(--accent-soft);color:var(--accent)}
.iname:hover .nm-edit{opacity:1}
.cellv{display:inline-block;min-width:40px;min-height:18px;cursor:pointer;border-radius:4px;padding:2px 4px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cellv:hover{outline:1px solid var(--border)}
.status-chip{display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600;border-radius:4px;padding:3px 10px;min-width:86px;cursor:pointer;text-align:center}
.sumrow td{font-size:12px;color:var(--muted);background:#fafbfe;font-weight:600}
.addrow{color:var(--muted);font-size:13px;cursor:pointer}
.addrow:hover{color:var(--accent)}
.gsum{font-size:12px;color:var(--muted);font-weight:500;margin-left:4px}

/* kanban */
#kanban{display:flex;gap:14px;align-items:flex-start;padding-top:18px;overflow-x:auto}
.kcol{background:#eef0f6;border-radius:10px;min-width:250px;width:250px;padding:10px;flex-shrink:0}
.kcol h4{font-size:13px;margin-bottom:10px;display:flex;gap:6px;align-items:center}
.kdot{width:10px;height:10px;border-radius:3px;display:inline-block}
.kcard{background:#fff;border-radius:8px;padding:10px;margin-bottom:8px;box-shadow:0 1px 2px rgba(0,0,0,.07);cursor:grab;font-size:13px}
.kcard .kb{color:var(--muted);font-size:11.5px;margin-top:5px;display:flex;gap:8px;flex-wrap:wrap}
.kcol.dragover{outline:2px dashed var(--accent)}

/* calendar */
#calendar{padding-top:14px}
.calhead{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.calhead h3{font-size:16px;min-width:150px;text-align:center}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.caldow{background:#fafbfe;padding:6px;font-size:11.5px;color:var(--muted);font-weight:600;text-align:center}
.calday{background:#fff;min-height:96px;padding:4px;font-size:12px}
.calday.dim{background:#fafafa;color:#c0c3d0}
.calday.today .dnum{background:var(--accent);color:#fff}
.dnum{display:inline-flex;width:22px;height:22px;border-radius:11px;align-items:center;justify-content:center;font-weight:600;margin-bottom:3px}
.calev{border-radius:4px;color:#fff;padding:2px 5px;font-size:11px;margin-bottom:2px;cursor:grab;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.calday.dragover{outline:2px dashed var(--accent);outline-offset:-2px}

/* modal & panel */
.overlay{position:fixed;inset:0;background:rgba(25,28,40,.4);display:flex;align-items:center;justify-content:center;z-index:50}
.modal{background:#fff;border-radius:12px;padding:22px;width:520px;max-width:94vw;max-height:88vh;overflow:auto;display:flex;flex-direction:column;gap:12px}
.modal h3{font-size:16px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
#panel{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:95vw;background:#fff;border-left:1px solid var(--border);box-shadow:-6px 0 24px rgba(0,0,0,.08);z-index:40;display:flex;flex-direction:column}
#panelHead{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
#panelBody{flex:1;overflow:auto;padding:14px 18px;display:flex;flex-direction:column;gap:14px}
.ptabs{display:flex;gap:14px;border-bottom:1px solid var(--border);padding:0 18px}
.ptabs button{padding:9px 2px;color:var(--muted);font-weight:500;border-bottom:2px solid transparent}
.ptabs button.active{color:var(--accent);border-color:var(--accent)}
.comment{background:#f7f8fc;border-radius:8px;padding:9px 11px;font-size:13px}
.comment .meta{font-size:11.5px;color:var(--muted);margin-bottom:3px}
.logline{font-size:12.5px;color:var(--muted);padding:5px 0;border-bottom:1px dashed var(--border)}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{background:var(--accent-soft);color:var(--accent);border-radius:12px;padding:2px 10px;font-size:12px;font-weight:600;display:inline-flex;gap:6px;align-items:center}
.chip button{color:inherit;opacity:.6}
.small{font-size:12px;color:var(--muted)}
.autorule{border:1px solid var(--border);border-radius:8px;padding:10px;display:flex;justify-content:space-between;gap:8px;align-items:center;font-size:13px}
hr{border:none;border-top:1px solid var(--border)}
.menu{position:fixed;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:60;min-width:160px;padding:4px;display:flex;flex-direction:column}
.menu button{text-align:left;padding:7px 10px;border-radius:5px;font-size:13px}
.menu button:hover{background:var(--accent-soft)}
.menu button.danger{color:var(--danger)}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#22242e;color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;z-index:99;display:none}
/* Fase 1: drag reorder + batch select */
.drag{cursor:grab;color:var(--muted);opacity:.4;font-size:12px;padding:0 1px;user-select:none;flex-shrink:0}
.drag:hover{opacity:.95}
.drag:active{cursor:grabbing}
.selbox{cursor:pointer;flex-shrink:0;margin:0 1px}
tr.dragrow>td{box-shadow:inset 0 2px 0 0 var(--accent)}
#batchbar{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#22242e;color:#fff;padding:8px 12px;border-radius:10px;display:flex;gap:8px;align-items:center;z-index:80;box-shadow:0 8px 30px rgba(0,0,0,.28);font-size:13px}
#batchbar .btn{padding:5px 11px}
</style>
</head>
<body>

<div id="login">
  <div class="card">
    <div class="logo">Lu<span>nes</span></div>
    <input id="lEmail" type="email" placeholder="Email" autocomplete="username">
    <input id="lPass" type="password" placeholder="Password" autocomplete="current-password">
    <div id="loginErr"></div>
    <button class="btn" id="lBtn" onclick="doLogin()">Sign in</button>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div style="display:flex;align-items:center">
      <div class="logo" id="logoTxt">Lu<span>nes</span></div>
      <div style="flex:1" id="logoSp"></div>
      <button class="icon-btn" id="navTgl" onclick="toggleNav()" title="Collapse sidebar">«</button>
    </div>
    <div id="boardList"></div>
    <button class="bnav" style="color:var(--muted)" onclick="addBoard()" id="newBoardBtn">+ New board</button>
    <div style="flex:1"></div>
    <button class="bnav" style="color:var(--muted)" onclick="logout()" id="userBtn">Sign out</button>
  </div>
  <div id="main">
    <div id="topbar">
      <span id="boardTitle"></span>
      <button class="icon-btn" onclick="boardMenu(event)" title="Board options">⋯</button>
      <div class="tabs">
        <button id="tab-table" class="active" onclick="setView('table')">Table</button>
        <button id="tab-kanban" onclick="setView('kanban')">Kanban</button>
        <button id="tab-calendar" onclick="setView('calendar')">Calendar</button>
      </div>
      <div id="topRight">
        <button class="btn sm ghost" onclick="openFilters()">⚲ Filter<span id="fBadge"></span></button>
        <button class="btn sm ghost" onclick="openColumns()">⚙ Columns</button>
        <button class="btn sm ghost" onclick="openAutomations()">⚡ Automate</button>
        <button class="icon-btn" id="bell" onclick="openNotifs(event)">🔔<span id="bellCount"></span></button>
      </div>
    </div>
    <div id="content" style="padding-top:6px"></div>
  </div>
</div>

<div id="toast"></div>
<script>
/* ================= CONFIG ================= */
const SUPA_URL='https://ybzrpqgofxkzaqasfsna.supabase.co';
const SUPA_KEY='sb_publishable_0I8ZhiGBgfjWKBwTHV3TSA_11Kj3Jid';
const sb=window.supabase.createClient(SUPA_URL,SUPA_KEY);
const GROUP_COLORS=['#579bfc','#00c875','#fdab3d','#e2445c','#a25ddc','#037f4c','#66ccff','#ff642e'];
const STATUS_COLORS=['#c4c4c4','#fdab3d','#00c875','#e2445c','#579bfc','#a25ddc','#333333','#ff158a'];

/* ================= STATE ================= */
let user=null, myName='';
let boards=[], curBoard=null, groups=[], cols=[], items=[], automations=[], notifs=[];
let view='table', collapsed={}, panelItem=null, panelTab='update';

const $=id=>document.getElementById(id);
const esc=s=>(s??'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid=()=>crypto.randomUUID();
const todayStr=()=>new Date().toISOString().slice(0,10);
// add exactly 1 calendar month to 'YYYY-MM-DD', clamping the day to the target month's length
function addMonth(ds){const p=ds.split('-').map(Number);let ny=p[0],nm=p[1]+1;if(nm>12){nm=1;ny++}const last=new Date(ny,nm,0).getDate();return ny+'-'+String(nm).padStart(2,'0')+'-'+String(Math.min(p[2],last)).padStart(2,'0')}
// stamp a "<prefix> MM/YYYY" name: replace an existing MM/YYYY pattern, else append
function stampMonthName(name,stamp){const re=/\b\d{1,2}\/\d{4}\b/;return re.test(name)?name.replace(re,stamp):(name+' '+stamp)}
const monthStamp=()=>{const n=new Date();return String(n.getMonth()+1).padStart(2,'0')+'/'+n.getFullYear()};
function toast(m){const t=$('toast');t.textContent=m;t.style.display='block';clearTimeout(t._h);t._h=setTimeout(()=>t.style.display='none',2600)}
const fmtMoney=n=>'R$ '+Number(n||0).toLocaleString('pt-BR',{maximumFractionDigits:2});

/* ================= AUTH ================= */
async function doLogin(){
  $('lBtn').disabled=true;$('loginErr').textContent='';
  const {data,error}=await sb.auth.signInWithPassword({email:$('lEmail').value.trim(),password:$('lPass').value});
  $('lBtn').disabled=false;
  if(error){$('loginErr').textContent=error.message;return}
  start(data.user);
}
async function logout(){await sb.auth.signOut();location.reload()}
$('lPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
sb.auth.getSession().then(({data})=>{if(data.session)start(data.session.user)});

async function start(u){
  user=u;myName=u.email.split('@')[0];
  $('login').style.display='none';$('app').style.display='flex';
  applyNav();
  await loadBoards();
  await loadNotifs();
  runTimeAutomations();
}

/* ================= DATA ================= */
async function loadBoards(){
  const {data}=await sb.from('boards').select('*').order('position');
  boards=data||[];
  renderBoardNav();
  if(boards.length&&!curBoard)selectBoard(boards[0].id);
  else if(!boards.length){$('boardTitle').textContent='Create your first board →';$('content').innerHTML=''}
}
async function selectBoard(id){
  curBoard=boards.find(b=>b.id===id);
  renderBoardNav();
  $('boardTitle').textContent=curBoard.name;
  const [g,c,i,a]=await Promise.all([
    sb.from('groups').select('*').eq('board_id',id).order('position'),
    sb.from('board_columns').select('*').eq('board_id',id).order('position'),
    sb.from('items').select('*').eq('board_id',id).eq('archived',false).order('position'),
    sb.from('automations').select('*').eq('board_id',id)
  ]);
  groups=g.data||[];cols=c.data||[];items=i.data||[];automations=a.data||[];
  filters={search:'',cols:{}};fBadge();
  renderView();
}
const itemCols=()=>cols.filter(c=>c.scope==='item');
const subCols=()=>cols.filter(c=>c.scope==='subitem');
const subsOf=id=>items.filter(x=>x.parent_id===id);
const topItems=()=>items.filter(x=>!x.parent_id);

async function addBoard(){
  const name=prompt('Board name:');if(!name)return;
  const {data,error}=await sb.from('boards').insert({name,position:boards.length}).select().single();
  if(error)return toast(error.message);
  // default setup
  const gs=[{board_id:data.id,name:'To Do',color:'#579bfc',position:0},{board_id:data.id,name:'Doing',color:'#fdab3d',position:1},{board_id:data.id,name:'Done',color:'#00c875',position:2}];
  await sb.from('groups').insert(gs);
  await sb.from('board_columns').insert([
    {board_id:data.id,scope:'item',name:'Person',type:'person',position:0,options:{}},
    {board_id:data.id,scope:'item',name:'Status',type:'status',position:1,options:{labels:[{name:'To Do',color:'#c4c4c4'},{name:'Working on it',color:'#fdab3d'},{name:'Done',color:'#00c875'},{name:'Stuck',color:'#e2445c'}]}},
    {board_id:data.id,scope:'item',name:'Date',type:'date',position:2,options:{}},
    {board_id:data.id,scope:'subitem',name:'Person',type:'person',position:0,options:{}},
    {board_id:data.id,scope:'subitem',name:'Status',type:'status',position:1,options:{labels:[{name:'To Do',color:'#c4c4c4'},{name:'Working on it',color:'#fdab3d'},{name:'Done',color:'#00c875'}]}},
    {board_id:data.id,scope:'subitem',name:'Date',type:'date',position:2,options:{}}
  ]);
  boards.push(data);renderBoardNav();selectBoard(data.id);
}
function boardMenu(e){
  menu(e,[
    ['Rename board',async()=>{const n=prompt('New name:',curBoard.name);if(!n)return;await sb.from('boards').update({name:n}).eq('id',curBoard.id);curBoard.name=n;$('boardTitle').textContent=n;renderBoardNav()}],
    ['Add group',async()=>{const n=prompt('Group name:');if(!n)return;const {data}=await sb.from('groups').insert({board_id:curBoard.id,name:n,color:GROUP_COLORS[groups.length%GROUP_COLORS.length],position:groups.length}).select().single();groups.push(data);renderView()}],
    ['⬇ Download CSV',()=>exportBoardCSV()],
    ['!Delete board',async()=>{if(!confirm('Delete board "'+curBoard.name+'" and ALL its data?'))return;await sb.from('boards').delete().eq('id',curBoard.id);boards=boards.filter(b=>b.id!==curBoard.id);curBoard=null;loadBoards()}]
  ]);
}
/* ===== CSV EXPORT (whole board: groups, items, subitems) ===== */
function csvEsc(v){v=(v==null?'':String(v));return /[",\n\r;]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v}
function csvCell(it,col){
  const p=(typeof numPair==='function')?numPair():null;
  if(col.type==='number'&&p&&!it.parent_id&&col.id===p.i.id){const ss=subSum(it);if(ss!=null)return ss}
  const v=it.col_values?.[col.id];return v==null?'':v;
}
function exportBoardCSV(){
  if(!curBoard)return;
  const ic=itemCols(),sc=subCols();
  const head=['Group','Level','Name',...ic.map(c=>'I: '+c.name),...sc.map(c=>'S: '+c.name)];
  const rows=[head];
  for(const g of groups){
    for(const it of topItems().filter(x=>x.group_id===g.id)){
      rows.push([g.name,'Item',it.name,...ic.map(c=>csvCell(it,c)),...sc.map(()=>'')]);
      for(const s of subsOf(it.id))rows.push([g.name,'Subitem',s.name,...ic.map(()=>''),...sc.map(c=>csvCell(s,c))]);
    }
  }
  const csv=rows.map(r=>r.map(csvEsc).join(',')).join('\r\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=(curBoard.name.replace(/[^\w]+/g,'_').replace(/^_+|_+$/g,'')||'board')+'.csv';
  document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  toast('CSV exported');
}
let navMin=localStorage.getItem('lunes_nav')==='min';
function boardInitials(n){const w=n.replace(/[^A-Za-z0-9À-ú\s]/g,' ').trim().split(/\s+/).filter(Boolean);return ((w[0]?.[0]||'')+(w[1]?.[0]||w[0]?.[1]||'')).toUpperCase()}
function boardColor(n){let h=0;for(const ch of n)h=(h*31+ch.charCodeAt(0))>>>0;return GROUP_COLORS[h%GROUP_COLORS.length]}
function toggleNav(){navMin=!navMin;localStorage.setItem('lunes_nav',navMin?'min':'full');applyNav()}
function applyNav(){
  document.getElementById('sidebar').classList.toggle('min',navMin);
  $('logoTxt').innerHTML=navMin?'L<span>.</span>':'Lu<span>nes</span>';
  $('navTgl').textContent=navMin?'»':'«';
  $('newBoardBtn').textContent=navMin?'+':'+ New board';
  $('newBoardBtn').style.textAlign=navMin?'center':'left';
  $('userBtn').textContent=navMin?'⏻':'Sign out ('+myName+')';
  $('userBtn').style.textAlign=navMin?'center':'left';
  renderBoardNav();
}
function renderBoardNav(){
  $('boardList').innerHTML=boards.map(b=>{

/* ================= ITEM CRUD + ACTIVITY ================= */
async function createItem(groupId,parentId,name,cv){
  const it={board_id:curBoard.id,group_id:groupId,parent_id:parentId,name,col_values:cv||{},position:items.length,created_by:myName};
  const {data,error}=await sb.from('items').insert(it).select().single();
  if(error)return toast(error.message);
  items.push(data);
  logActivity(data.id,'created','', '');
  runAutomations('item_created',data);
  renderView();
}
function calAdd(e,ds){
  if(e.target!==e.currentTarget&&!e.target.classList.contains('dnum'))return;
  const iCol=calColFor(false),sCol=calColFor(true);
  const opts=iCol?groups.map(g=>['+ Item in '+g.name,()=>{const n=prompt('Item name:');if(n)createItem(g.id,null,n,{[iCol.id]:ds})}]):[];
  if(sCol&&topItems().length)opts.push(['+ Subitem of…',()=>{
    menu(lastMenuEvent,topItems().map(it=>['↳ '+it.name.slice(0,42),()=>{const n=prompt('Subitem name:');if(n)createItem(it.group_id,it.id,n,{[sCol.id]:ds})}]));
  }]);
  if(opts.length)menu(e,opts);
}
function kAdd(e,colId,val){
  menu(e,groups.map(g=>['+ in '+g.name,()=>{const n=prompt('Item name:');if(n)createItem(g.id,null,n,val?{[colId]:val}:{})}]));
}
async function updateItem(it,patch,activityField,oldV,newV){
  Object.assign(it,patch);
  patch.updated_at=new Date().toISOString();
  const {error}=await sb.from('items').update(patch).eq('id',it.id);
  if(error)return toast(error.message);
  if(activityField)logActivity(it.id,activityField,oldV,newV);
}
async function setCell(itemId,colId,val){
  const it=items.find(x=>x.id===itemId);const col=cols.find(c=>c.id===colId);
  const old=it.col_values[colId]??'';
  if(String(old)===String(val))return renderView();
  const p=typeof numPair==='function'?numPair():null;
  if(p&&!it.parent_id&&col.id===p.i.id){
    if(window._forceTotal===it.id){
      window._forceTotal=null;
      for(const s of subsOf(it.id)){
        if(s.col_values[p.s.id]!=null&&s.col_values[p.s.id]!==''){
          s.col_values={...s.col_values,[p.s.id]:''};
          await sb.from('items').update({col_values:s.col_values}).eq('id',s.id);
        }
      }
    }else if(subSum(it)!=null){return renderView()} // computed cell: ignore direct edits
  }
  if(p&&it.parent_id&&col.id===p.s.id&&val!==''){
    const par=items.find(x=>x.id===it.parent_id);
    if(par&&par.col_values[p.i.id]!==''&&par.col_values[p.i.id]!=null&&subSum(par)==null){
      if(!confirm('The parent item has a manual total.\nFilling this subitem value will DELETE the item total (it becomes the sum of subitems). Continue?'))return renderView();
      par.col_values={...par.col_values,[p.i.id]:''};
      await sb.from('items').update({col_values:par.col_values}).eq('id',par.id);
    }
  }
  it.col_values={...it.col_values,[colId]:val};
  await updateItem(it,{col_values:it.col_values},col.name,old,val);
  if(col.type==='status')runAutomations('status_changes',it,{colId,value:val});
  renderView();if(panelItem===itemId)renderPanel();
}
async function logActivity(itemId,field,oldV,newV){
  await sb.from('activity_logs').insert({item_id:itemId,author:myName,field,old_value:String(oldV??''),new_value:String(newV??'')});
}
function itemMenu(e,id){
  const it=items.find(x=>x.id===id);
  const opts=[];
  if(!it.parent_id)opts.push(['Move to group…',()=>moveItemDialog(it)],['Duplicate',()=>duplicateItem(it,it.group_id)]);
  opts.push(['!Delete',()=>deleteItem(id)]);
  menu(e,opts);
}
async function deleteItem(id){
  const it=items.find(x=>x.id===id);if(!it)return;
  if(!confirm('Delete "'+it.name+'"?'))return;
  await sb.from('items').delete().eq('id',id);
  items=items.filter(x=>x.id!==id&&x.parent_id!==id);
  renderView();
}
/* click = open details (delayed so dblclick can cancel); dblclick or ✎ = inline rename */
function nmClick(e,id){
  e.stopPropagation();
  clearTimeout(window._nmT);
  window._nmT=setTimeout(()=>openPanel(id),260);
}
function startRename(e,id){
  e.stopPropagation();clearTimeout(window._nmT);
  const it=items.find(x=>x.id===id);
  const span=document.querySelector(`[data-nm="${id}"]`);
  if(!it||!span)return;

  inp.addEventListener('blur',done);

}
function moveItemDialog(it){
  menu(lastMenuEvent,groups.map(g=>[g.name,async()=>{await updateItem(it,{group_id:g.id},'group',groupName(it.group_id),g.name);renderView()}]));
}
const groupName=id=>groups.find(g=>g.id===id)?.name||'?';
async function duplicateItem(it,targetGroup,suffix){
  const copy={board_id:it.board_id,group_id:targetGroup,parent_id:null,name:it.name+(suffix||' (copy)'),col_values:it.col_values,position:items.length,created_by:myName};
  const {data}=await sb.from('items').insert(copy).select().single();
  const subs=subsOf(it.id).map(s=>({board_id:s.board_id,group_id:targetGroup,parent_id:data.id,name:s.name,col_values:s.col_values,position:s.position,created_by:myName}));
  if(subs.length){const {data:sd}=await sb.from('items').insert(subs).select();items.push(...(sd||[]))}
  items.push(data);renderView();return data;
}

/* ================= FILTERS ================= */
let filters={search:'',cols:{}};
function fBadge(){const n=Object.keys(filters.cols).length+(filters.search?1:0);const b=$('fBadge');if(b)b.textContent=n?' ('+n+')':''}
function passFilter(it){
  const q=(filters.search||'').toLowerCase();
  if(q&&!(it.name.toLowerCase().includes(q)||Object.values(it.col_values||{}).some(v=>String(v).toLowerCase().includes(q))))return false;
  const isSub=!!it.parent_id;
  for(const cid in filters.cols){
    const f=filters.cols[cid];const col=cols.find(c=>c.id===cid);
    if(!col||f==null||f==='')continue;
    if((col.scope==='subitem')!==isSub)continue; // filter only applies to its scope
    const v=it.col_values[cid];
    if(col.type==='number'){
      const n=parseFloat(v);
      if(f.min!=null&&f.min!==''&&!(n>=parseFloat(f.min)))return false;
      if(f.max!=null&&f.max!==''&&!(n<=parseFloat(f.max)))return false;
    }else if(col.type==='date'){
      if(f.from&&!(v&&v>=f.from))return false;
      if(f.to&&!(v&&v<=f.to))return false;
    }else if(col.type==='checkbox'){
      if(f==='checked'&&!v)return false;
      if(f==='unchecked'&&v)return false;
    }else if(col.type==='status'||col.type==='person'||col.type==='label'){
      if(String(v||'')!==f)return false;
    }else{
      if(!String(v||'').toLowerCase().includes(String(f).toLowerCase()))return false;
    }
  }
  return true;
}
function setFilter(id,v){if(v)filters.cols[id]=v;else delete filters.cols[id];renderView();fBadge()}
function setFilterObj(id,k,v){const f=filters.cols[id]||(filters.cols[id]={});f[k]=v;if(!f.from&&!f.to&&!f.min&&!f.max)delete filters.cols[id];renderView();fBadge()}
function filterCtl(c){
  const f=filters.cols[c.id];
  if(c.type==='status'||c.type==='person'||c.type==='label'){
    const opts=c.type==='status'?(c.options.labels||[]).map(l=>l.name):(c.options.choices||[]);
    return `<select onchange="setFilter('${c.id}',this.value)"><option value="">all</option>${opts.map(o=>`<option ${f===o?'selected':''}>${esc(o)}</option>`).join('')}</select>`;
  }
  if(c.type==='date')return `<input type="date" value="${(f&&f.from)||''}" onchange="setFilterObj('${c.id}','from',this.value)"> <span class="small">to</span> <input type="date" value="${(f&&f.to)||''}" onchange="setFilterObj('${c.id}','to',this.value)">`;
  if(c.type==='number')return `<span class="small">min</span> <input type="number" style="width:90px" value="${(f&&f.min)??''}" onchange="setFilterObj('${c.id}','min',this.value)"> <span class="small">max</span> <input type="number" style="width:90px" value="${(f&&f.max)??''}" onchange="setFilterObj('${c.id}','max',this.value)">`;
  if(c.type==='checkbox')return `<select onchange="setFilter('${c.id}',this.value)"><option value="">all</option><option value="checked" ${f==='checked'?'selected':''}>checked</option><option value="unchecked" ${f==='unchecked'?'selected':''}>unchecked</option></select>`;
  return `<input value="${esc(typeof f==='string'?f:'')}" placeholder="contains…" oninput="setFilter('${c.id}',this.value)">`;
}
function openFilters(){
  overlay(`<h3>⚲ Filters — ${esc(curBoard.name)}</h3>
    <div class="row"><span class="small" style="width:120px">Search</span><input value="${esc(filters.search)}" style="flex:1" oninput="filters.search=this.value;renderView();fBadge()"></div>
    <b class="small">ITEM COLUMNS</b>
    ${itemCols().map(c=>`<div class="row"><span class="small" style="width:120px">${esc(c.name)}</span>${filterCtl(c)}</div>`).join('')||'<p class="small">—</p>'}
    <b class="small">SUBITEM COLUMNS</b>
    ${subCols().map(c=>`<div class="row"><span class="small" style="width:120px">${esc(c.name)}</span>${filterCtl(c)}</div>`).join('')||'<p class="small">—</p>'}
    <button class="btn sm ghost" style="align-self:flex-start" onclick="filters={search:'',cols:{}};renderView();fBadge();this.closest('.overlay').remove();openFilters()">Clear all</button>`);
}
// subitem-scoped filters also hide items that have no matching subitem
const subFiltersActive=()=>Object.keys(filters.cols).some(id=>{const c=cols.find(x=>x.id===id);return c&&c.scope==='subitem'&&filters.cols[id]!==''&&filters.cols[id]!=null});
const itemVisible=it=>passFilter(it)&&(!subFiltersActive()||subsOf(it.id).some(passFilter));

/* ===== item total = sum of subitem values (primary number pair) ===== */
function numPair(){const i=itemCols().find(c=>c.type==='number');const s=subCols().find(c=>c.type==='number');return (i&&s)?{i,s}:null}
function subSum(it){
  const p=numPair();if(!p)return null;
  const withVal=subsOf(it.id).filter(s=>s.col_values[p.s.id]!==''&&s.col_values[p.s.id]!=null);
  if(!withVal.length)return null;
  return withVal.reduce((t,s)=>t+(parseFloat(s.col_values[p.s.id])||0),0);
}
function effNum(it,col){
  const p=numPair();
  if(p&&col.id===p.i.id&&!it.parent_id){const ss=subSum(it);if(ss!=null)return ss}
  return parseFloat(it.col_values[col.id])||0;
}
function forceItemTotal(e,itemId,colId){
  if(!confirm('This total is calculated from the subitem values.\nTyping a manual value will DELETE the subitem values. Continue?'))return;
  window._forceTotal=itemId;
  editCell(e,itemId,colId);
}

/* ================= VIEWS ================= */
function setView(v){view=v;['table','kanban','calendar'].forEach(x=>$('tab-'+x).classList.toggle('active',x===v));renderView()}
function renderView(){
  if(!curBoard)return;
  if(view==='table')renderTable();
  else if(view==='kanban')renderKanban();
  else renderCalendar();
  renderBatchBar();
}

/* ---- cell rendering & editing ---- */
function cellHtml(it,col){
  const v=it.col_values[col.id];
  if(col.type==='status'){
    const lbl=(col.options.labels||[]).find(l=>l.name===v);
    return `<span class="status-chip" style="background:${lbl?lbl.color:'#c4c4c4'}" onclick="statusMenu(event,'${it.id}','${col.id}')">${esc(v||'—')}</span>`;
  }
  if(col.type==='checkbox')return `<input type="checkbox" ${v?'checked':''} onchange="setCell('${it.id}','${col.id}',this.checked)">`;
  if(col.type==='person'||col.type==='label'){
    return `<span class="cellv" onclick="choiceMenu(event,'${it.id}','${col.id}')">${v?esc(v):'—'}</span>`;
  }
  if(col.type==='link')return v?`<a href="${esc(v)}" target="_blank" style="color:var(--accent)">🔗 link</a> <span class="cellv" style="min-width:12px" onclick="editCell(event,'${it.id}','${col.id}')">✎</span>`:`<span class="cellv" onclick="editCell(event,'${it.id}','${col.id}')"></span>`;
  if(!it.parent_id&&col.type==='number'){
    const p=numPair();
    if(p&&col.id===p.i.id){
      const ss=subSum(it);
      if(ss!=null)return `<span class="cellv" style="font-style:italic" title="Sum of subitem values — click to type a manual total" onclick="forceItemTotal(event,'${it.id}','${col.id}')">Σ ${esc(fmtMoney(ss))}</span>`;
    }
  }
  let disp=v??'';
  if(col.type==='number'&&v!==''&&v!=null)disp=fmtMoney(v);
  return `<span class="cellv" onclick="editCell(event,'${it.id}','${col.id}')">${esc(disp)}</span>`;
}
function statusMenu(e,itemId,colId){
  const col=cols.find(c=>c.id===colId);
  menu(e,(col.options.labels||[]).map(l=>['●'+l.name,()=>setCell(itemId,colId,l.name),l.color]).concat([['— clear',()=>setCell(itemId,colId,'')]]));
}
function editCell(e,itemId,colId){
  e.stopPropagation();
  const it=items.find(x=>x.id===itemId),col=cols.find(c=>c.id===colId);
  const cur=it.col_values[colId]??'';
  const span=e.currentTarget;
  const inp=document.createElement('input');
  inp.type=col.type==='date'?'date':col.type==='number'?'number':'text';
  inp.value=cur;inp.style.width=col.type==='date'?'135px':'110px';inp.step='any';
  span.replaceWith(inp);inp.focus();
  const done=()=>setCell(itemId,colId,inp.value);
  inp.addEventListener('blur',done);
  inp.addEventListener('keydown',ev=>{if(ev.key==='Enter')inp.blur();if(ev.key==='Escape'){inp.removeEventListener('blur',done);renderView()}});
}
/* dropdown with "create or find" (person & label columns) */
function choiceMenu(e,itemId,colId){
  e.stopPropagation();
  document.querySelectorAll('.menu').forEach(m=>m.remove());
  const col=cols.find(c=>c.id===colId);
  const m=document.createElement('div');m.className='menu';m.style.minWidth='210px';
  const inp=document.createElement('input');inp.placeholder='Create or find…';inp.style.margin='4px';
  const list=document.createElement('div');list.style.maxHeight='220px';list.style.overflow='auto';list.style.display='flex';list.style.flexDirection='column';
  m.appendChild(inp);m.appendChild(list);
  const draw=()=>{
    const q=inp.value.trim().toLowerCase();
    list.innerHTML='';
    (col.options.choices||[]).filter(c=>c.toLowerCase().includes(q)).forEach(name=>{
      const b=document.createElement('button');b.textContent=name;
      b.onclick=()=>{close();setCell(itemId,colId,name)};list.appendChild(b);
    });
    if(q&&!(col.options.choices||[]).some(c=>c.toLowerCase()===q)){
      const b=document.createElement('button');b.textContent='+ Add "'+inp.value.trim()+'"';b.style.color='var(--accent)';b.style.fontWeight='600';
      b.onclick=async()=>{close();const nv=inp.value.trim();col.options={...col.options,choices:[...(col.options.choices||[]),nv]};await sb.from('board_columns').update({options:col.options}).eq('id',colId);setCell(itemId,colId,nv)};
      list.appendChild(b);
    }
    const clr=document.createElement('button');clr.textContent='— clear';clr.className='danger';
    clr.onclick=()=>{close();setCell(itemId,colId,'')};list.appendChild(clr);
  };
  const closer=ev=>{if(!m.contains(ev.target))close()};
  const close=()=>{m.remove();document.removeEventListener('mousedown',closer)};
  inp.addEventListener('input',draw);
  inp.addEventListener('keydown',ev=>{if(ev.key==='Enter'){const first=list.querySelector('button');if(first)first.click()}if(ev.key==='Escape')close()});
  draw();
  document.body.appendChild(m);
  m.style.left=Math.min(e.clientX,innerWidth-230)+'px';
  m.style.top=Math.min(e.clientY,innerHeight-290)+'px';
  inp.focus();
  setTimeout(()=>document.addEventListener('mousedown',closer));
}

/* ---- TABLE ---- */
function renderTable(){
  const ic=itemCols(),sc=subCols();
  let html='';
  for(const g of groups){
    const gi=topItems().filter(x=>x.group_id===g.id&&itemVisible(x));
    const isCol=collapsed[g.id];
    // sums (uses effective value: subitem sum or manual)
    const sums=ic.filter(c=>c.type==='number').map(c=>{
      const t=gi.reduce((s,it)=>s+effNum(it,c),0);
      return {c,t};
    });
    const W=colW();
    html+=`<div class="group">
      <div class="group-head">
        <h3 style="color:${g.color}" onclick="collapsed['${g.id}']=!collapsed['${g.id}'];renderView()">${isCol?'▸':'▾'} ${esc(g.name)}</h3>
        <button class="icon-btn" onclick="groupMenu(event,'${g.id}')">⋯</button>
      </div>`;
    if(!isCol){
      // table-layout:fixed only works with an explicit table width → sum the column widths
      const tw=(W.name||300)+ic.reduce((t,c)=>t+(W[c.id]||140),0)+40;
      const sw=(W.s_name||260)+sc.reduce((t,c)=>t+(W['s_'+c.id]||140),0)+40;
      html+=`<table class="gtable" style="table-layout:fixed;width:${tw}px"><tr><th style="width:${W.name||300}px;position:relative">Item<span class="rz" onmousedown="rzStart(event,'name')"></span></th>${ic.map(c=>`<th style="width:${W[c.id]||140}px;position:relative">${esc(c.name)}<span class="rz" onmousedown="rzStart(event,'${c.id}')"></span></th>`).join('')}<th style="width:40px"></th></tr>`;
      for(const it of gi){
        const subs=subsOf(it.id);
        const shown=collapsed['x'+it.id]||subFiltersActive();
        html+=`<tr class="item" ondragover="rowOver(event)" ondragleave="rowLeave(event)" ondrop="rowDrop(event,'${it.id}','item')"><td><div class="iname">
          <input type="checkbox" class="selbox" ${selected.has(it.id)?'checked':''} onclick="event.stopPropagation();toggleSel('${it.id}',this.checked)">
          <span class="drag" draggable="true" ondragstart="rowDragStart(event,'${it.id}','item')" ondragend="rowDragEnd(event)" title="Drag to reorder">⠿</span>
          <button class="exp" onclick="collapsed['x${it.id}']=!collapsed['x${it.id}'];renderView()">${subs.length?(shown?'▾':'▸'):'·'}</button>
          <span class="nm" data-nm="${it.id}" onclick="nmClick(event,'${it.id}')" ondblclick="startRename(event,'${it.id}')">${esc(it.name)}</span>
          <button class="nm-edit" title="Rename" onclick="startRename(event,'${it.id}')">✎</button>
          ${subs.length?`<span class="small">${subs.length}</span>`:''}
        </div></td>
        ${ic.map(c=>`<td>${cellHtml(it,c)}</td>`).join('')}
        <td><button class="icon-btn" onclick="itemMenu(event,'${it.id}')">⋯</button></td></tr>`;
        if(shown){
          // subitems live in their own nested table → independent, resizable column widths
          html+=`<tr class="subwrap"><td colspan="${ic.length+2}">
            <table class="gtable subtable" style="table-layout:fixed;width:${sw}px">
            <tr><th style="width:${W.s_name||260}px;position:relative">Subitem<span class="rz" onmousedown="rzStart(event,'s_name')"></span></th>
            ${sc.map(c=>`<th style="width:${W['s_'+c.id]||140}px;position:relative">${esc(c.name)}<span class="rz" onmousedown="rzStart(event,'s_${c.id}')"></span></th>`).join('')}
            <th style="width:40px"></th></tr>`;
          for(const s of subs.filter(s=>passFilter(s))){
            html+=`<tr class="subrow" ondragover="rowOver(event)" ondragleave="rowLeave(event)" ondrop="rowDrop(event,'${s.id}','sub')"><td><div class="iname">
              <input type="checkbox" class="selbox" ${selected.has(s.id)?'checked':''} onclick="event.stopPropagation();toggleSel('${s.id}',this.checked)">
              <span class="drag" draggable="true" ondragstart="rowDragStart(event,'${s.id}','sub')" ondragend="rowDragEnd(event)" title="Drag to reorder">⠿</span>
              <span class="nm" data-nm="${s.id}" onclick="nmClick(event,'${s.id}')" ondblclick="startRename(event,'${s.id}')">${esc(s.name)}</span>
              <button class="nm-edit" title="Rename" onclick="startRename(event,'${s.id}')">✎</button>
            </div></td>
            ${sc.map(c=>`<td>${cellHtml(s,c)}</td>`).join('')}
            <td><button class="icon-btn" style="color:var(--danger)" title="Delete subitem" onclick="deleteItem('${s.id}')">🗑</button></td></tr>`;
          }
          html+=`<tr class="subrow"><td colspan="${sc.length+2}" class="addrow" onclick="promptAdd('${g.id}','${it.id}')">+ Add subitem</td></tr>`;
          html+=`</table></td></tr>`;
        }
      }
      html+=`<tr><td colspan="${ic.length+2}" class="addrow" onclick="promptAdd('${g.id}',null)">+ Add item</td></tr>`;

/* ===== Fase 1: drag reorder + batch select ===== */
let dragCtx=null, selected=new Set();
function rowDragStart(e,id,scope){dragCtx={id,scope};e.dataTransfer.effectAllowed='move';try{e.dataTransfer.setData('text/plain',id)}catch(_){}}
function rowDragEnd(e){dragCtx=null;document.querySelectorAll('.dragrow').forEach(r=>r.classList.remove('dragrow'))}
function rowOver(e){if(!dragCtx)return;e.preventDefault();const tr=e.currentTarget;document.querySelectorAll('.dragrow').forEach(r=>{if(r!==tr)r.classList.remove('dragrow')});tr.classList.add('dragrow')}
function rowLeave(e){e.currentTarget.classList.remove('dragrow')}
async function rowDrop(e,targetId,scope){
  e.preventDefault();e.stopPropagation();
  e.currentTarget.classList.remove('dragrow');
  const ctx=dragCtx;dragCtx=null;
  if(!ctx||ctx.scope!==scope||ctx.id===targetId)return;
  const dragged=items.find(x=>x.id===ctx.id),target=items.find(x=>x.id===targetId);
  if(!dragged||!target)return;
  if(scope==='item'&&dragged.group_id!==target.group_id)return;   // reorder only within same group
  if(scope==='sub'&&dragged.parent_id!==target.parent_id)return;  // reorder only within same parent
  let list=(scope==='item'?topItems().filter(x=>x.group_id===dragged.group_id):subsOf(dragged.parent_id)).slice().sort((a,b)=>(a.position||0)-(b.position||0));
  list=list.filter(x=>x.id!==dragged.id);
  const ti=list.findIndex(x=>x.id===target.id);
  list.splice(ti<0?list.length:ti,0,dragged);   // drop before the target row
  list.forEach((it,i)=>it.position=i);
  renderView();
  await Promise.all(list.map(it=>sb.from('items').update({position:it.position}).eq('id',it.id)));
}
function toggleSel(id,on){if(on)selected.add(id);else selected.delete(id);renderBatchBar()}
function clearSel(){selected.clear();renderView()}
function renderBatchBar(){
  let bb=document.getElementById('batchbar');
  if(!selected.size||view!=='table'){if(bb)bb.remove();return}
  if(!bb){bb=document.createElement('div');bb.id='batchbar';document.body.appendChild(bb)}
  bb.innerHTML=`<b>Modify ${selected.size} item(s) in bulk</b>
    <button class="btn sm" onclick="batchModify()">Change value</button>
    <button class="btn sm" style="background:var(--danger)" onclick="batchDelete()">Delete</button>
    <button class="btn sm ghost" onclick="clearSel()">Clear</button>`;
}
async function batchDelete(){
  const ids=[...selected];if(!ids.length)return;
  if(!confirm('Delete '+ids.length+' selected item(s)? Subitems of selected items are also removed.'))return;
  const childIds=items.filter(x=>x.parent_id&&ids.includes(x.parent_id)&&!ids.includes(x.id)).map(x=>x.id);
  const all=[...new Set([...ids,...childIds])];
  const {error}=await sb.from('items').delete().in('id',all);
  if(error)return toast(error.message);
  items=items.filter(x=>!all.includes(x.id));
  selected.clear();renderView();toast(ids.length+' deleted');
}
function batchModify(){
  const sel=items.filter(x=>selected.has(x.id));
  const hasItem=sel.some(x=>!x.parent_id),hasSub=sel.some(x=>x.parent_id);
  const opts=cols.filter(c=>(c.scope==='item'&&hasItem)||(c.scope==='subitem'&&hasSub));
  if(!opts.length)return toast('No applicable columns for the selection');
  overlay(`<h3>Change value — ${selected.size} item(s)</h3>
    <div class="row"><span class="small" style="width:70px">Column</span>
      <select id="bmCol" onchange="bmValueUI()">${opts.map(c=>`<option value="${c.id}">${esc(c.name)} (${c.scope})</option>`).join('')}</select></div>
    <div class="row"><span class="small" style="width:70px">Value</span><span id="bmVal"></span></div>
    <p class="small">Applies only to selected rows matching the column's scope.</p>
    <button class="btn" style="align-self:flex-start" onclick="batchApply()">Apply</button>`);
  bmValueUI();
}
function bmValueUI(){
  const c=cols.find(x=>x.id===$('bmCol').value);const w=$('bmVal');
  if(c.type==='status')w.innerHTML=`<select id="bmInput"><option value="">— clear</option>${(c.options.labels||[]).map(l=>`<option>${esc(l.name)}</option>`).join('')}</select>`;
  else if(c.type==='person'||c.type==='label'){const ch=c.options.choices||[];w.innerHTML=`<input id="bmInput" list="bmList" placeholder="value"><datalist id="bmList">${ch.map(o=>`<option>${esc(o)}</option>`).join('')}</datalist>`}
  else if(c.type==='date')w.innerHTML=`<input id="bmInput" type="date">`;
  else if(c.type==='number')w.innerHTML=`<input id="bmInput" type="number" step="any">`;
  else if(c.type==='checkbox')w.innerHTML=`<select id="bmInput"><option value="">unchecked</option><option value="1">checked</option></select>`;
  else w.innerHTML=`<input id="bmInput" placeholder="value">`;
}
async function batchApply(){
  const c=cols.find(x=>x.id===$('bmCol').value);const raw=$('bmInput')?.value??'';
  const targets=items.filter(x=>selected.has(x.id)&&((x.parent_id?'subitem':'item')===c.scope));
  if(!targets.length)return toast('No selected rows in this column scope');
  if(!confirm('Set '+c.name+' = "'+raw+'" on '+targets.length+' '+c.scope+'(s)?'))return;
  const val=c.type==='checkbox'?!!raw:raw;
  for(const it of targets){it.col_values={...it.col_values,[c.id]:val};await sb.from('items').update({col_values:it.col_values}).eq('id',it.id)}
  document.querySelector('.overlay')?.remove();
  renderView();toast('Applied to '+targets.length+' item(s)');
}

/* ---- CALENDAR ---- */
let calMonth=new Date();
function calDateCol(){
  const saved=curBoard.cdate&&curBoard.cdate!=='both'&&cols.find(c=>c.id===curBoard.cdate);
  return saved||cols.find(c=>c.type==='date'&&c.scope==='item')||cols.find(c=>c.type==='date');
}
// which date column applies to a given row in the current calendar mode
function calColFor(isSub){
  if(curBoard.cdate==='both')return cols.find(c=>c.type==='date'&&c.scope===(isSub?'subitem':'item'));
  return calDateCol();
}
function renderCalendar(){
  const both=curBoard.cdate==='both';
  const dcol=calDateCol();
  if(!dcol){$('content').innerHTML='<p class="small" style="margin-top:30px">Add a date column to use Calendar.</p>';return}
  const y=calMonth.getFullYear(),m=calMonth.getMonth();
  const first=new Date(y,m,1),startDow=(first.getDay()+6)%7;
  const daysIn=new Date(y,m+1,0).getDate();
  const dateCols=cols.filter(c=>c.type==='date');
  let html=`<div id="calendar"><div class="calhead">
    <button class="btn sm ghost" onclick="calMonth=new Date(${y},${m-1},1);renderView()">‹</button>
    <h3>${calMonth.toLocaleString('en',{month:'long'})} ${y}</h3>
    <button class="btn sm ghost" onclick="calMonth=new Date(${y},${m+1},1);renderView()">›</button>
    <button class="btn sm ghost" onclick="calMonth=new Date();renderView()">Today</button>
    <span class="small">Date column:</span>
    <select onchange="curBoard.cdate=this.value;renderView()">${dateCols.map(c=>`<option value="${c.id}" ${!both&&c.id===dcol.id?'selected':''}>${esc(c.name)} (${c.scope})</option>`).join('')}<option value="both" ${both?'selected':''}>Both (item + subitem)</option></select>
  </div><div class="calgrid">`;
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d=>html+=`<div class="caldow">${d}</div>`);
  const pool=items.filter(it=>passFilter(it));
  const today=todayStr();
  for(let cell=0;cell<Math.ceil((startDow+daysIn)/7)*7;cell++){
    const dnum=cell-startDow+1;
    if(dnum<1||dnum>daysIn){html+='<div class="calday dim"></div>';continue}
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(dnum).padStart(2,'0')}`;
    const evs=pool.filter(it=>{const c=calColFor(!!it.parent_id);return c&&it.col_values[c.id]===ds});
    html+=`<div class="calday ${ds===today?'today':''}" data-d="${ds}" onclick="calAdd(event,'${ds}')" style="cursor:pointer" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="cdrop(event)">
      <span class="dnum">${dnum}</span>
      ${evs.map(it=>{const g=groups.find(x=>x.id===it.group_id);return `<div class="calev" style="background:${g?g.color:'#579bfc'}" draggable="true" ondragstart="event.dataTransfer.setData('t','${it.id}')" onclick="event.stopPropagation();openPanel('${it.id}')" title="${esc(it.name)}">${it.parent_id?'↳ ':''}${esc(it.name)}</div>`}).join('')}
    </div>`;
  }
  html+='</div></div>';
  $('content').innerHTML=html;
}
function cdrop(e){
  e.preventDefault();
  const el=e.currentTarget;el.classList.remove('dragover');
  const id=e.dataTransfer.getData('t');
  if(!id)return;
  const it=items.find(x=>x.id===id);
  const c=calColFor(!!(it&&it.parent_id));
  if(c)setCell(id,c.id,el.dataset.d);
}

let lastMenuEvent=null;
function menu(e,options){
  e.stopPropagation?.();lastMenuEvent=e;
  document.querySelectorAll('.menu').forEach(m=>m.remove());
  const m=document.createElement('div');m.className='menu';
  options.forEach(([label,fn,color])=>{
    const b=document.createElement('button');
    const danger=label.startsWith('!');
    b.textContent=danger?label.slice(1):label;
    if(danger)b.className='danger';
    if(color){b.style.color=color}
    b.onclick=()=>{m.remove();fn()};
    m.appendChild(b);
  });
  document.body.appendChild(m);
  const x=Math.min(e.clientX||100,innerWidth-190),yy=Math.min(e.clientY||100,innerHeight-m.offsetHeight-10);
  m.style.left=x+'px';m.style.top=yy+'px';
  setTimeout(()=>document.addEventListener('click',()=>m.remove(),{once:true}));
}

async function uploadAtt(){

async function moveCol(id,dir){
  const list=cols.filter(c=>c.scope===window._colScope);
  list.forEach((c,i)=>c.position=i);
  const i=list.findIndex(c=>c.id===id),j=i+dir;
  if(j<0||j>=list.length)return;
  [list[i].position,list[j].position]=[list[j].position,list[i].position];
  await Promise.all(list.map(c=>sb.from('board_columns').update({position:c.position}).eq('id',c.id)));
  cols.sort((a,b)=>(a.scope===b.scope)?a.position-b.position:0);
  renderColList();renderView();
}
async function saveColOpts(c){await sb.from('board_columns').update({options:c.options}).eq('id',c.id);renderColList();renderView()}
async function labelColor(colId,i){
  const c=cols.find(x=>x.id===colId);const l=c.options.labels[i];
  l.color=STATUS_COLORS[(STATUS_COLORS.indexOf(l.color)+1)%STATUS_COLORS.length];
  await saveColOpts(c);
}
async function moveLabel(colId,i,dir){
  const c=cols.find(x=>x.id===colId);const ls=c.options.labels;const j=i+dir;
  if(j<0||j>=ls.length)return;
  [ls[i],ls[j]]=[ls[j],ls[i]];
  await saveColOpts(c);
}
async function renameLabel(colId,i){
  const c=cols.find(x=>x.id===colId);const old=c.options.labels[i].name;
  const n=prompt('Label text:',old);if(!n||n===old)return;
  c.options.labels[i].name=n;
  await sb.from('board_columns').update({options:c.options}).eq('id',colId);
  const affected=items.filter(it=>it.col_values[colId]===old);
  for(const it of affected){it.col_values={...it.col_values,[colId]:n};await sb.from('items').update({col_values:it.col_values}).eq('id',it.id)}
  renderColList();renderView();
}
async function delChoice(colId,i){
  const c=cols.find(x=>x.id===colId);c.options.choices.splice(i,1);
  await saveColOpts(c);
}
async function addChoice(colId){
  const c=cols.find(x=>x.id===colId);const n=prompt('New option:');if(!n)return;
  c.options={...c.options,choices:[...(c.options.choices||[]),n.trim()]};
  await saveColOpts(c);
}
async function addColumn(){
  const name=$('ncName').value.trim();if(!name)return;
  const type=$('ncType').value;
  const options=type==='status'?{labels:[{name:'To Do',color:'#c4c4c4'},{name:'Working on it',color:'#fdab3d'},{name:'Done',color:'#00c875'}]}:(type==='person'||type==='label')?{choices:[]}:{};
  const {data,error}=await sb.from('board_columns').insert({board_id:curBoard.id,scope:window._colScope,name,type,options,position:cols.filter(c=>c.scope===window._colScope).length}).select().single();
  if(error)return toast(error.message);
  cols.push(data);$('ncName').value='';renderColList();renderView();
}
async function renameCol(id){
  const c=cols.find(x=>x.id===id);const n=prompt('Column name:',c.name);if(!n)return;
  await sb.from('board_columns').update({name:n}).eq('id',id);c.name=n;renderColList();renderView();
}
async function delCol(id){
  if(!confirm('Delete this column? Values will be lost.'))return;
  await sb.from('board_columns').delete().eq('id',id);cols=cols.filter(c=>c.id!==id);renderColList();renderView();
}
async function addLabel(colId){
  const c=cols.find(x=>x.id===colId);const n=prompt('Label name:');if(!n)return;
  const color=STATUS_COLORS[(c.options.labels||[]).length%STATUS_COLORS.length];
  c.options.labels=[...(c.options.labels||[]),{name:n,color}];
  await sb.from('board_columns').update({options:c.options}).eq('id',colId);renderColList();renderView();
}
async function delLabel(colId,i){
  const c=cols.find(x=>x.id===colId);c.options.labels.splice(i,1);
  await sb.from('board_columns').update({options:c.options}).eq('id',colId);renderColList();renderView();
}
function overlay(inner){
  document.querySelector('.overlay')?.remove();
  const o=document.createElement('div');o.className='overlay';
  o.innerHTML=`<div class="modal">${inner}<button class="btn ghost" style="align-self:flex-end" onclick="this.closest('.overlay').remove()">Close</button></div>`;
  o.addEventListener('click',e=>{if(e.target===o)o.remove()});
  document.body.appendChild(o);
}

/* ================= AUTOMATIONS ================= */
function openAutomations(){
  const sCols=cols.filter(c=>c.type==='status');
  const dCols=cols.filter(c=>c.type==='date');
  overlay(`<h3>⚡ Automations — ${esc(curBoard.name)}</h3>
    <div id="autoList"></div><hr>
    <b style="font-size:13.5px">New rule</b>
    <div class="row"><span class="small">When</span>
      <select id="aTrig" onchange="autoTrigUI()">
        <option value="status_changes">status changes to…</option>
        <option value="date_arrives">a date arrives</option>
        <option value="monthly">every month (day N)</option>
        <option value="item_created">item is created</option>
        <option value="auto_date_duplication">⭐ monthly duplication → next month (special)</option>
      </select><span id="aTrigX"></span></div>
    <div class="row" id="aActRow"><span class="small">Then</span>
      <select id="aAct" onchange="autoActUI()">
        <option value="move_group">move item to group…</option>
        <option value="set_column">set a column to…</option>
        <option value="duplicate">duplicate item into group…</option>
        <option value="archive">archive item</option>
        <option value="notify">notify a user</option>
      </select><span id="aActX"></span></div>
    <button class="btn sm" style="align-self:flex-start" onclick="saveAutomation()">Add rule</button>
    <hr><b style="font-size:13.5px">Log</b><div id="autoLog" class="small">loading…</div>`);
  window._sCols=sCols;window._dCols=dCols;
  autoTrigUI();autoActUI();renderAutoList();loadAutoLog();
}
function autoTrigUI(){
  const t=$('aTrig').value,x=$('aTrigX');
  if(t==='status_changes')x.innerHTML=`<select id="aTc">${window._sCols.map(c=>`<option value="${c.id}">${esc(c.name)} (${c.scope})</option>`).join('')}</select> to <select id="aTv"></select>`,fillTv();
  else if(t==='date_arrives')x.innerHTML=`<select id="aTc">${window._dCols.map(c=>`<option value="${c.id}">${esc(c.name)} (${c.scope})</option>`).join('')}</select>`;
  else if(t==='monthly')x.innerHTML=`day <input id="aTd" type="number" min="1" max="28" value="1" style="width:60px"> — applies to items in group <select id="aTg">${groups.map(g=>`<option value="${g.id}">${esc(g.name)}</option>`).join('')}</select>`;
  else if(t==='auto_date_duplication'){
    const itemDate=cols.filter(c=>c.type==='date'&&c.scope==='item');
    const gsel=id=>`<select id="${id}">${groups.map(g=>`<option value="${g.id}">${esc(g.name)}</option>`).join('')}</select>`;
    x.innerHTML=itemDate.length
      ? `<select id="aDd">${itemDate.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}</select> arrives, duplicate all items of ${gsel('aDsrc')} → stamp name with current MM/YYYY, move copies to ${gsel('aDdst')}, then push originals' dates +1 month`
      : `<span class="small" style="color:var(--danger)">Add an item date column first (e.g. "Ref").</span>`;
  }
  else x.innerHTML='';
  const actRow=$('aActRow');if(actRow)actRow.style.display=(t==='auto_date_duplication')?'none':'';
  const tc=$('aTc');if(tc&&t==='status_changes')tc.onchange=fillTv;
}
function fillTv(){
  const c=cols.find(x=>x.id===$('aTc').value);
  $('aTv').innerHTML=((c?.options?.labels)||[]).map(l=>`<option>${esc(l.name)}</option>`).join('');
}
function autoActUI(){
  const a=$('aAct').value,x=$('aActX');
  if(a==='move_group'||a==='duplicate')x.innerHTML=`<select id="aAg">${groups.map(g=>`<option value="${g.id}">${esc(g.name)}</option>`).join('')}</select>`;
  else if(a==='set_column')x.innerHTML=`<select id="aAc">${cols.map(c=>`<option value="${c.id}">${esc(c.name)} (${c.scope})</option>`).join('')}</select> = <input id="aAv" style="width:110px" placeholder="value">`;
  else if(a==='notify')x.innerHTML=`<input id="aAe" placeholder="user email" style="width:180px"> msg: <input id="aAm" placeholder="message (optional)" style="width:160px">`;
  else x.innerHTML='';
}
async function saveAutomation(){
  const t=$('aTrig').value,a=$('aAct').value;
  const trigger={type:t};
  if(t==='status_changes'){trigger.colId=$('aTc').value;trigger.value=$('aTv').value}
  if(t==='date_arrives')trigger.colId=$('aTc').value;
  if(t==='monthly'){trigger.day=parseInt($('aTd').value)||1;trigger.groupId=$('aTg').value}
  if(t==='auto_date_duplication'){
    const dd=$('aDd');if(!dd)return toast('Add an item date column first (e.g. "Ref")');
    trigger.dateCol=dd.value;trigger.srcGroup=$('aDsrc').value;trigger.dstGroup=$('aDdst').value;
    const {data,error}=await sb.from('automations').insert({board_id:curBoard.id,trigger,action:{type:'auto_date_duplication'},enabled:true}).select().single();
    if(error)return toast(error.message);
    automations.push(data);renderAutoList();toast('Special rule added');return;
  }
  const action={type:a};
  if(a==='move_group'||a==='duplicate')action.groupId=$('aAg').value;
  if(a==='set_column'){action.colId=$('aAc').value;action.value=$('aAv').value}
  if(a==='notify'){action.email=$('aAe').value.trim();action.message=$('aAm').value.trim();if(!action.email)return toast('Email required')}
  const {data,error}=await sb.from('automations').insert({board_id:curBoard.id,trigger,action}).select().single();
  if(error)return toast(error.message);
  automations.push(data);renderAutoList();toast('Rule added');
}
function describeAuto(a){
  const t=a.trigger,ac=a.action;
  const cn=id=>cols.find(c=>c.id===id)?.name||'?';
  const gn=id=>groups.find(g=>g.id===id)?.name||'?';
  if(t.type==='auto_date_duplication')return `⭐ Monthly: when <b>${esc(cn(t.dateCol))}</b> arrives → duplicate all items of <b>${esc(gn(t.srcGroup))}</b>, stamp name with current MM/YYYY, move copies to <b>${esc(gn(t.dstGroup))}</b>, then push originals' item+subitem dates +1 month`;
  let s='When ';
  if(t.type==='status_changes')s+=`<b>${esc(cn(t.colId))}</b> → "${esc(t.value)}"`;
  else if(t.type==='date_arrives')s+=`<b>${esc(cn(t.colId))}</b> arrives`;
  else if(t.type==='monthly')s+=`every month day ${t.day} (group <b>${esc(gn(t.groupId))}</b>)`;
  else s+='item is created';
  s+=', then ';
  if(ac.type==='move_group')s+=`move to <b>${esc(gn(ac.groupId))}</b>`;
  else if(ac.type==='set_column')s+=`set <b>${esc(cn(ac.colId))}</b> = "${esc(ac.value)}"`;
  else if(ac.type==='duplicate')s+=`duplicate into <b>${esc(gn(ac.groupId))}</b>`;
  else if(ac.type==='archive')s+='archive item';
  else s+=`notify <b>${esc(ac.email)}</b>`;
  return s;
}
function renderAutoList(){
  $('autoList').innerHTML=automations.map(a=>`<div class="autorule"><span>${describeAuto(a)} ${a.enabled?'':'<span class="small">(off)</span>'}</span>
    <span><button class="icon-btn" title="toggle" onclick="toggleAuto('${a.id}')">${a.enabled?'⏸':'▶'}</button>
    <button class="icon-btn" style="color:var(--danger)" onclick="delAuto('${a.id}')">🗑</button></span></div>`).join('')||'<p class="small">No rules yet.</p>';
}
async function toggleAuto(id){const a=automations.find(x=>x.id===id);a.enabled=!a.enabled;await sb.from('automations').update({enabled:a.enabled}).eq('id',id);renderAutoList()}
async function delAuto(id){await sb.from('automations').delete().eq('id',id);automations=automations.filter(x=>x.id!==id);renderAutoList()}
async function loadAutoLog(){
  const {data}=await sb.from('automation_logs').select('*').eq('board_id',curBoard.id).order('created_at',{ascending:false}).limit(50);
  const el=$('autoLog');if(!el)return;
  el.innerHTML=(data||[]).map(l=>`<div class="logline">${esc(l.message)}<br><span style="font-size:11px">${new Date(l.created_at).toLocaleString()}</span></div>`).join('')||'No executions yet.';
}
async function autoLog(boardId,autoId,itemId,message){
  await sb.from('automation_logs').insert({board_id:boardId,automation_id:autoId,item_id:itemId,message});
}

/* ---- engine ---- */
// human text of what triggered the rule (goes into the notification)
function trigText(a,colsArr){
  const t=a.trigger,cn=id=>(colsArr||[]).find(c=>c.id===id)?.name||'?';
  if(t.type==='status_changes')return '"'+cn(t.colId)+'" changed to "'+t.value+'"';
  if(t.type==='date_arrives')return '"'+cn(t.colId)+'" date is today';
  if(t.type==='monthly')return 'monthly trigger (day '+t.day+')';
  if(t.type==='auto_date_duplication')return 'monthly duplication ran';
  return 'item was created';
}
function notifMsg(a,it,bName,colsArr,parentName){
  const nm=(parentName?parentName+' / ':'')+(it.parent_id?'↳ ':'')+it.name;
  return '⚡ '+nm+': '+trigText(a,colsArr)+(a.action.message?' — '+a.action.message:'')+' ('+bName+')';
}
async function execAction(a,it){
  const ac=a.action;
  if(ac.type==='move_group'&&!it.parent_id){await updateItem(it,{group_id:ac.groupId},'group',groupName(it.group_id),groupName(ac.groupId))}
  else if(ac.type==='set_column'){const old=it.col_values[ac.colId]??'';it.col_values={...it.col_values,[ac.colId]:ac.value};await updateItem(it,{col_values:it.col_values},cols.find(c=>c.id===ac.colId)?.name||'column',old,ac.value)}
  else if(ac.type==='duplicate'){await duplicateItem(it,ac.groupId,' | '+new Date().toLocaleDateString('en',{month:'short',year:'numeric'}))}
  else if(ac.type==='archive'){await updateItem(it,{archived:true});items=items.filter(x=>x.id!==it.id&&x.parent_id!==it.id)}
  else if(ac.type==='notify'){const pn=it.parent_id?items.find(x=>x.id===it.parent_id)?.name:null;await sb.from('notifications').insert({user_email:ac.email,message:notifMsg(a,it,curBoard.name,cols,pn),board_id:it.board_id,item_id:it.id})}
  await autoLog(it.board_id,a.id,it.id,'Rule ['+describeAuto(a).replace(/<[^>]+>/g,'')+'] ran on "'+it.name+'"');
}
async function runAutomations(evType,it,ctx){
  for(const a of automations.filter(a=>a.enabled&&a.trigger.type===evType)){
    const t=a.trigger;
    if(evType==='status_changes'&&(t.colId!==ctx.colId||String(t.value)!==String(ctx.value)))continue;
    await execAction(a,it);
  }
  renderView();
}
async function runTimeAutomations(){
  // runs across ALL boards on app load
  const {data:autos}=await sb.from('automations').select('*').eq('enabled',true);
  const timeAutos=(autos||[]).filter(a=>['date_arrives','monthly','auto_date_duplication'].includes(a.trigger.type));
  if(!timeAutos.length)return;
  const {data:allItems}=await sb.from('items').select('*').eq('archived',false);
  const {data:allBoards}=await sb.from('boards').select('*');
  const {data:allGroups}=await sb.from('groups').select('*');
  const {data:allCols}=await sb.from('board_columns').select('*');
  const now=new Date(),ym=now.toISOString().slice(0,7),today=todayStr();
  for(const a of timeAutos){
    const t=a.trigger;
    const bItems=(allItems||[]).filter(x=>x.board_id===a.board_id);
    if(t.type==='monthly'){
      if((t.last_run||'')>=ym||now.getDate()<t.day)continue;
      // duplicate/notify/etc every top item of the source group
      const src=bItems.filter(x=>x.group_id===t.groupId&&!x.parent_id);
      for(const it of src)await execTimeAction(a,it,allBoards,allGroups,allCols,allItems);
      t.last_run=ym;
      await sb.from('automations').update({trigger:t}).eq('id',a.id);
    }else if(t.type==='date_arrives'){
      for(const it of bItems){
        const dv=it.col_values?.[t.colId];
        if(!dv||dv>today)continue;
        const done=it.col_values['_auto_'+a.id];
        if(done)continue;
        await execTimeAction(a,it,allBoards,allGroups,allCols,allItems);
        it.col_values={...it.col_values,['_auto_'+a.id]:today};
        await sb.from('items').update({col_values:it.col_values}).eq('id',it.id);
      }
    }else if(t.type==='auto_date_duplication'){
      // fire at most once per calendar month, when any source-group item's Ref date has arrived
      if((t.last_run||'')>=ym)continue;
      const srcTop=bItems.filter(x=>x.group_id===t.srcGroup&&!x.parent_id);
      const arrived=srcTop.some(it=>{const dv=it.col_values?.[t.dateCol];return dv&&dv<=today});
      if(!arrived)continue;
      const stamp=monthStamp();
      const bCols=(allCols||[]).filter(c=>c.board_id===a.board_id);
      // 1) duplicate every source item (+its subitems) into the destination group, stamping the copy's name
      for(const it of srcTop){
        const nm=stampMonthName(it.name,stamp);
        const {data:ni}=await sb.from('items').insert({board_id:it.board_id,group_id:t.dstGroup,name:nm,col_values:it.col_values,created_by:'automation'}).select().single();
        if(!ni)continue;
        const subs=(allItems||[]).filter(sx=>sx.parent_id===it.id).map(sx=>({board_id:sx.board_id,group_id:t.dstGroup,parent_id:ni.id,name:sx.name,col_values:sx.col_values,created_by:'automation'}));
        if(subs.length)await sb.from('items').insert(subs);
      }
      // 2) push originals' date columns (items + subitems of the source group) forward exactly 1 month
      const srcAll=bItems.filter(x=>x.group_id===t.srcGroup);
      for(const it of srcAll){
        const dcols=bCols.filter(c=>c.type==='date'&&c.scope===(it.parent_id?'subitem':'item'));
        let cv={...it.col_values},ch=false;
        for(const c of dcols){const v=cv[c.id];if(v){cv[c.id]=addMonth(v);ch=true}}
        if(ch)await sb.from('items').update({col_values:cv}).eq('id',it.id);
      }
      t.last_run=ym;
      await sb.from('automations').update({trigger:t}).eq('id',a.id);
      await autoLog(a.board_id,a.id,null,'Monthly duplication ('+stamp+'): '+srcTop.length+' item(s) copied to destination group; originals pushed +1 month');
    }
  }
  if(curBoard)selectBoard(curBoard.id);
  loadNotifs();
}
async function execTimeAction(a,it,allBoards,allGroups,allCols,allItems){
  const ac=a.action;
  const bName=(allBoards||[]).find(b=>b.id===it.board_id)?.name||'';
  const gName=id=>(allGroups||[]).find(g=>g.id===id)?.name||'?';
  if(ac.type==='move_group'&&!it.parent_id)await sb.from('items').update({group_id:ac.groupId}).eq('id',it.id);
  else if(ac.type==='set_column'){const cv={...it.col_values,[ac.colId]:ac.value};it.col_values=cv;await sb.from('items').update({col_values:cv}).eq('id',it.id)}
  else if(ac.type==='archive')await sb.from('items').update({archived:true}).eq('id',it.id);
  else if(ac.type==='notify'){const pn=it.parent_id?(allItems||[]).find(x=>x.id===it.parent_id)?.name:null;const bCols=(allCols||[]).filter(c=>c.board_id===it.board_id);await sb.from('notifications').insert({user_email:ac.email,message:notifMsg(a,it,bName,bCols,pn),board_id:it.board_id,item_id:it.id})}
  else if(ac.type==='duplicate'){
    const suffix=' | '+new Date().toLocaleDateString('en',{month:'short',year:'numeric'});
    const {data:ni}=await sb.from('items').insert({board_id:it.board_id,group_id:ac.groupId,name:it.name+suffix,col_values:it.col_values,created_by:'automation'}).select().single();
    const subs=(allItems||[]).filter(s=>s.parent_id===it.id).map(s=>({board_id:s.board_id,group_id:ac.groupId,parent_id:ni.id,name:s.name,col_values:s.col_values,created_by:'automation'}));
    if(subs.length)await sb.from('items').insert(subs);
  }
  await autoLog(it.board_id,a.id,it.id,'Rule ran on "'+it.name+'" (time-based)');
}

/* ================= NOTIFICATIONS ================= */
async function loadNotifs(){
  const {data}=await sb.from('notifications').select('*').eq('user_email',user.email).order('created_at',{ascending:false}).limit(50);
  notifs=data||[];
  const unread=notifs.filter(n=>!n.read).length;
  const bc=$('bellCount');bc.style.display=unread?'block':'none';bc.textContent=unread;
}
function openNotifs(e){
  menu(e,notifs.length?notifs.slice(0,15).map(n=>[(n.read?'· ':'● ')+n.message.slice(0,90),()=>openNotif(n)])
    .concat([['Mark all read',async()=>{await sb.from('notifications').update({read:true}).eq('user_email',user.email);loadNotifs()}]]):[['No notifications',()=>{}]]);
}
// clicking a notification marks it read and opens the referenced item/subitem
async function openNotif(n){
  await sb.from('notifications').update({read:true}).eq('id',n.id);n.read=true;loadNotifs();
  if(!n.board_id)return;
  if(!boards.find(b=>b.id===n.board_id))return toast('Board no longer exists');
  if(!curBoard||curBoard.id!==n.board_id)await selectBoard(n.board_id);
  if(!n.item_id)return;
  if(items.find(x=>x.id===n.item_id))openPanel(n.item_id);
  else toast('Item not found (deleted or archived)');
}
